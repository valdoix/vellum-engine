<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1020" viewBox="0 0 1280 1020" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bgp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181410"/><stop offset="1" stop-color="#0c0a07"/></linearGradient>
    <linearGradient id="cardp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#231e16"/><stop offset="1" stop-color="#16130d"/></linearGradient>
    <radialGradient id="avp" cx="40%" cy="35%" r="75%"><stop offset="0" stop-color="#3a2f1a"/><stop offset="1" stop-color="#1d180f"/></radialGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#241f16"/><stop offset="1" stop-color="#15120c"/></linearGradient>
  </defs>
  <rect width="1280" height="1020" fill="url(#bgp)"/>
  <text x="40" y="48" fill="#cda84e" font-size="25" letter-spacing="2">PRESENT-CHARACTER CARDS · tab + floating window</text>
  <text x="40" y="72" fill="#9a8f78" font-size="14" font-style="italic">The "In the room" block (name · mood · condition · doing · inner thought). Current → redesign, both surfaces, all themes.</text>

  <!-- ============ CURRENT ============ -->
  <text x="40" y="112" fill="#ff8a8a" font-family="monospace" font-size="12" letter-spacing="1">CURRENT — flat rows, shouty mono tags</text>
  <g>
    <rect x="40" y="124" width="380" height="150" rx="13" fill="url(#cardp)" stroke="#cda84e" stroke-opacity="0.14"/>
    <text x="58" y="148" fill="#cda84e" font-family="monospace" font-size="10" letter-spacing="1.5">PRESENT · 2</text>
    <text x="58" y="174" fill="#e7d6ad" font-size="16">Sister Aveline</text>
    <rect x="178" y="162" width="48" height="16" rx="5" fill="#8fa67e" fill-opacity="0.2"/><text x="186" y="174" fill="#a9c089" font-family="monospace" font-size="8.5">WARY</text>
    <rect x="232" y="162" width="64" height="16" rx="5" fill="#c96a6a" fill-opacity="0.18"/><text x="240" y="174" fill="#e09090" font-family="monospace" font-size="8.5">BLEEDING</text>
    <text x="58" y="194" fill="#cdbfa0" font-size="12">Pressing a torn sleeve to the wound, watching the stairs.</text>
    <text x="58" y="212" fill="#cdbfa0" font-size="12.5" font-style="italic">「He said the door was sealed. He lied.」</text>
    <text x="58" y="240" fill="#e7d6ad" font-size="16">Coren</text>
    <rect x="116" y="228" width="60" height="16" rx="5" fill="#8fa67e" fill-opacity="0.2"/><text x="124" y="240" fill="#a9c089" font-family="monospace" font-size="8.5">GUARDED</text>
    <text x="58" y="260" fill="#cdbfa0" font-size="12">Between her and the dark, blade half-drawn.</text>
  </g>
  <text x="440" y="150" fill="#d8a0a0" font-size="11" font-family="monospace">· no portrait — names blur together</text>
  <text x="440" y="170" fill="#d8a0a0" font-size="11" font-family="monospace">· UPPERCASE mono tags fight the serif</text>
  <text x="440" y="190" fill="#d8a0a0" font-size="11" font-family="monospace">· mood/condition/doing/thought all</text>
  <text x="440" y="210" fill="#d8a0a0" font-size="11" font-family="monospace">  same weight — no focal point</text>
  <text x="440" y="230" fill="#d8a0a0" font-size="11" font-family="monospace">· the inner thought (the gem) is buried</text>

  <line x1="40" y1="296" x2="1240" y2="296" stroke="#cda84e" stroke-opacity="0.15"/>

  <!-- ============ REDESIGN — DRAWER TAB ============ -->
  <text x="40" y="330" fill="#9fd08a" font-family="monospace" font-size="13" letter-spacing="1">REDESIGN A · the Drawer "Now" tab — portrait stage cards</text>

  <!-- card 1: Aveline (full) -->
  <g>
    <rect x="40" y="348" width="560" height="150" rx="16" fill="url(#cardp)" stroke="#cda84e" stroke-opacity="0.18"/>
    <rect x="40" y="348" width="5" height="150" rx="2.5" fill="#8fa67e"/>
    <!-- portrait -->
    <circle cx="100" cy="402" r="34" fill="url(#avp)" stroke="#8fa67e" stroke-width="2"/>
    <text x="100" y="411" fill="#cda84e" font-size="24" text-anchor="middle" font-style="italic">A</text>
    <circle cx="124" cy="380" r="6" fill="#8fa67e" stroke="#16130d" stroke-width="2"/>
    <!-- name + mood/condition as sentence-case sentiment text -->
    <text x="156" y="384" fill="#f2e4bd" font-size="19">Sister Aveline</text>
    <text x="156" y="406" fill="#a9c089" font-size="13" font-style="italic">wary</text>
    <text x="194" y="406" fill="#6f6655" font-size="13">·</text>
    <text x="206" y="406" fill="#e09090" font-size="13" font-style="italic">bleeding</text>
    <!-- doing -->
    <text x="156" y="430" fill="#cdbfa0" font-size="13.5">Pressing a torn sleeve to the wound, watching the stairs.</text>
    <!-- thought as a quoted pull, set apart -->
    <rect x="156" y="444" width="3" height="34" fill="#cda84e" opacity="0.5"/>
    <text x="170" y="458" fill="#b48ed0" font-size="9" font-family="monospace" letter-spacing="1">THINKING</text>
    <text x="170" y="476" fill="#d9c9f0" font-size="14" font-style="italic">"He said the door was sealed. He lied."</text>
  </g>
  <!-- card 2: Coren (no thought) -->
  <g>
    <rect x="40" y="510" width="560" height="104" rx="16" fill="url(#cardp)" stroke="#cda84e" stroke-opacity="0.18"/>
    <rect x="40" y="510" width="5" height="104" rx="2.5" fill="#8fa67e"/>
    <circle cx="100" cy="556" r="30" fill="url(#avp)" stroke="#8fa67e" stroke-width="2"/>
    <text x="100" y="565" fill="#cda84e" font-size="22" text-anchor="middle" font-style="italic">C</text>
    <circle cx="121" cy="537" r="5" fill="#8fa67e" stroke="#16130d" stroke-width="2"/>
    <text x="150" y="544" fill="#f2e4bd" font-size="19">Coren</text>
    <text x="150" y="566" fill="#a9c089" font-size="13" font-style="italic">guarded</text>
    <text x="150" y="592" fill="#cdbfa0" font-size="13.5">Between her and the dark, blade half-drawn.</text>
  </g>
  <text x="630" y="376" fill="#9fd08a" font-size="12" font-family="monospace">· portrait medallion + presence dot anchors each person</text>
  <text x="630" y="398" fill="#bcd9ad" font-size="12" font-family="monospace">· mood/condition = sentence-case, sentiment-colored</text>
  <text x="630" y="420" fill="#bcd9ad" font-size="12" font-family="monospace">  (sage=calm, red=harm, violet=thought)</text>
  <text x="630" y="442" fill="#bcd9ad" font-size="12" font-family="monospace">· the inner THOUGHT gets its own quoted block —</text>
  <text x="630" y="464" fill="#bcd9ad" font-size="12" font-family="monospace">  it's the most evocative datum, so it's the focal point</text>
  <text x="630" y="486" fill="#bcd9ad" font-size="12" font-family="monospace">· card height adapts: no thought → compact (Coren)</text>
  <text x="630" y="518" fill="#9fd08a" font-size="12" font-family="monospace">· left spine green = present (matches Cast tab spine)</text>

  <line x1="40" y1="636" x2="1240" y2="636" stroke="#cda84e" stroke-opacity="0.15"/>

  <!-- ============ REDESIGN — FLOATING WINDOW (narrow) ============ -->
  <text x="40" y="670" fill="#9fd08a" font-family="monospace" font-size="13" letter-spacing="1">REDESIGN B · the Floating Window (narrow) — stacked, portrait-left</text>

  <!-- the float frame -->
  <g>
    <rect x="40" y="688" width="300" height="300" rx="16" fill="#15120c" stroke="#cda84e" stroke-opacity="0.4"/>
    <rect x="40" y="688" width="300" height="56" rx="16" fill="#cda84e" fill-opacity="0.05"/>
    <text x="60" y="722" fill="#cda84e" font-size="13">✦</text><text x="80" y="724" fill="#e7d6ad" font-size="14" letter-spacing="2">VELLUM</text>
    <text x="324" y="724" fill="#9a8f78" font-size="12" text-anchor="end">✕</text>
    <line x1="40" y1="744" x2="340" y2="744" stroke="#cda84e" stroke-opacity="0.2"/>
    <!-- scene hero -->
    <text x="60" y="772" fill="#f2e4bd" font-size="17" font-style="italic">The drowned chapel</text>
    <text x="60" y="790" fill="#8a8071" font-family="monospace" font-size="9">IN THE ROOM · 2</text>
    <!-- compact present card 1 -->
    <rect x="56" y="800" width="268" height="86" rx="11" fill="url(#cardp)"/>
    <rect x="56" y="800" width="4" height="86" rx="2" fill="#8fa67e"/>
    <circle cx="84" cy="826" r="16" fill="url(#avp)" stroke="#8fa67e" stroke-width="1.5"/><text x="84" y="831" fill="#cda84e" font-size="12" text-anchor="middle">A</text>
    <circle cx="96" cy="814" r="4" fill="#8fa67e" stroke="#231e16" stroke-width="1.5"/>
    <text x="110" y="822" fill="#f2e4bd" font-size="14">Sister Aveline</text>
    <text x="110" y="838" fill="#a9c089" font-size="10.5" font-style="italic">wary · bleeding</text>
    <text x="68" y="862" fill="#cdbfa0" font-size="11">Pressing a sleeve to the wound.</text>
    <text x="68" y="878" fill="#d9c9f0" font-size="11" font-style="italic">"...the door was sealed. He lied."</text>
    <!-- compact present card 2 -->
    <rect x="56" y="894" width="268" height="62" rx="11" fill="url(#cardp)"/>
    <rect x="56" y="894" width="4" height="62" rx="2" fill="#8fa67e"/>
    <circle cx="84" cy="920" r="15" fill="url(#avp)" stroke="#8fa67e" stroke-width="1.5"/><text x="84" y="925" fill="#cda84e" font-size="11" text-anchor="middle">C</text>
    <text x="108" y="916" fill="#f2e4bd" font-size="14">Coren</text>
    <text x="108" y="932" fill="#a9c089" font-size="10.5" font-style="italic">guarded</text>
    <text x="68" y="950" fill="#cdbfa0" font-size="11">Blade half-drawn, between her &amp; the dark.</text>
  </g>
  <text x="370" y="716" fill="#9fd08a" font-size="12" font-family="monospace">same card, reflowed for ~300px width:</text>
  <text x="370" y="738" fill="#bcd9ad" font-size="12" font-family="monospace">· smaller portrait, name+mood share a line</text>
  <text x="370" y="760" fill="#bcd9ad" font-size="12" font-family="monospace">· thought truncates with an ellipsis,</text>
  <text x="370" y="782" fill="#bcd9ad" font-size="12" font-family="monospace">  full text on tap/title</text>
  <text x="370" y="804" fill="#bcd9ad" font-size="12" font-family="monospace">· container query drives the reflow —</text>
  <text x="370" y="826" fill="#bcd9ad" font-size="12" font-family="monospace">  ONE component, two layouts</text>

  <!-- ============ THEME VARIANTS of the present card ============ -->
  <text x="700" y="670" fill="#cda84e" font-family="monospace" font-size="13" letter-spacing="1">SAME CARD · themed</text>

  <!-- Fantasy parchment -->
  <g>
    <rect x="700" y="690" width="540" height="86" rx="10" fill="#e6d6ac"/>
    <circle cx="744" cy="733" r="26" fill="#7d2b27"/><text x="744" y="742" fill="#f0c4c0" font-size="18" text-anchor="middle" font-style="italic">A</text>
    <text x="784" y="718" fill="#2a1d0c" font-size="17" font-style="italic">Sister Aveline</text>
    <text x="784" y="738" fill="#7d2b27" font-size="12" font-style="italic">wary, &amp; bleeding from the stair</text>
    <text x="784" y="758" fill="#5a4524" font-size="12" font-style="italic">"He swore the door was sealed. He lied."</text>
    <text x="1224" y="712" fill="#9a6f1e" font-family="monospace" font-size="8" text-anchor="end">⚜ PRESENT</text>
  </g>
  <text x="700" y="794" fill="#bcd9ad" font-size="10.5" font-family="monospace">FANTASY — wax-seal portrait on vellum, brown ink, no spine</text>

  <!-- Modern -->
  <g>
    <rect x="700" y="808" width="540" height="78" rx="18" fill="#171c24" stroke="#2a3340"/>
    <circle cx="742" cy="847" r="22" fill="#222a35"/><text x="742" y="853" fill="#a7e8c8" font-size="15" text-anchor="middle" font-weight="bold">A</text>
    <circle cx="758" cy="832" r="6" fill="#34d399" stroke="#171c24" stroke-width="2"/>
    <text x="778" y="838" fill="#f3f6fb" font-size="16" font-family="-apple-system,sans-serif" font-weight="600">Sister Aveline</text>
    <rect x="778" y="850" width="48" height="20" rx="10" fill="#34d399" fill-opacity="0.14"/><text x="802" y="864" fill="#6ee7b7" font-size="10" text-anchor="middle" font-family="sans-serif">wary</text>
    <rect x="832" y="850" width="68" height="20" rx="10" fill="#f87171" fill-opacity="0.14"/><text x="866" y="864" fill="#fca5a5" font-size="10" text-anchor="middle" font-family="sans-serif">bleeding</text>
    <text x="940" y="858" fill="#9aa6b8" font-size="12" font-style="italic" font-family="sans-serif">"...he lied."</text>
  </g>
  <text x="700" y="904" fill="#bcd9ad" font-size="10.5" font-family="monospace">MODERN — rounded card, pill tags, presence dot, sans</text>

  <!-- Futuristic -->
  <g font-family="monospace">
    <rect x="700" y="918" width="540" height="78" rx="0" fill="#04121a" stroke="#28e0d8" stroke-opacity="0.4"/>
    <line x1="700" y1="918" x2="700" y2="996" stroke="#28e0d8" stroke-width="2"/>
    <circle cx="742" cy="957" r="22" fill="none" stroke="#28e0d8" stroke-width="1.5"/>
    <path d="M742 930 v7 M742 984 v-7 M715 957 h7 M769 957 h-7" stroke="#28e0d8" stroke-width="1.5"/>
    <text x="742" y="962" fill="#28e0d8" font-size="13" text-anchor="middle">A</text>
    <text x="778" y="944" fill="#e6feff" font-size="14" letter-spacing="1">AVELINE_S ▸</text>
    <text x="778" y="962" fill="#ffb05c" font-size="10">STATUS :: WARY ▪ INTEGRITY 51%</text>
    <rect x="778" y="968" width="180" height="5" fill="none" stroke="#0a4a58"/><rect x="779" y="969" width="92" height="3" fill="#ff5a3c"/>
    <text x="778" y="990" fill="#7fd8e6" font-size="9.5">» "the door was sealed. he lied."</text>
  </g>
  <text x="700" y="1014" fill="#bcd9ad" font-size="10.5" font-family="monospace">FUTURISTIC — reticle avatar, telemetry, integrity = condition</text>

  <text x="40" y="1014" fill="#6f6655" font-size="11" font-style="italic">Concept art. One presentBlock component; container-query reflow for the float; thought is the focal point. Reuses scene.detail (mood/condition/doing/thought).</text>
</svg>
