<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="940" viewBox="0 0 1280 940" font-family="Georgia, serif">
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a1610"/><stop offset="1" stop-color="#0d0b08"/></linearGradient>
  </defs>
  <rect width="1280" height="940" fill="#26221b"/>
  <text x="40" y="46" fill="#cda84e" font-size="25" letter-spacing="2">CURRENT — the tab shell + navigation (drawer)</text>
  <text x="40" y="72" fill="#9a8f78" font-size="15" font-style="italic">Reconstructed from app.ts + chronicle.ts. Red = problems.</text>

  <!-- shell -->
  <rect x="40" y="100" width="600" height="800" rx="14" fill="url(#g4)" stroke="#cda84e" stroke-opacity="0.4"/>

  <!-- head -->
  <text x="64" y="138" fill="#cda84e" font-size="15">❖</text>
  <text x="86" y="140" fill="#e7d6ad" font-size="20" letter-spacing="2">VELLUM</text>
  <text x="176" y="140" fill="#cda84e" font-family="monospace" font-size="10">II</text>
  <text x="610" y="140" fill="#9a8f78" font-family="monospace" font-size="9" text-anchor="end">T147 · D12 · 9 cast · 14 bonds · ☁ rain</text>
  <line x1="40" y1="152" x2="640" y2="152" stroke="#cda84e" stroke-opacity="0.16"/>

  <!-- TAB BAR: 6 primary + sep + 2 tools, all equal-weight uppercase pills -->
  <g font-family="monospace" font-size="11" letter-spacing="0.5">
    <rect x="64" y="166" width="44" height="28" rx="9" fill="#cda84e" fill-opacity="0.2" stroke="#cda84e" stroke-opacity="0.45"/><text x="74" y="184" fill="#cda84e">NOW</text>
    <rect x="114" y="166" width="86" height="28" rx="9" fill="none" stroke="none"/><text x="122" y="184" fill="#9a8f78">CHRONICLE</text>
    <rect x="206" y="166" width="48" height="28" rx="9"/><text x="214" y="184" fill="#9a8f78">CAST</text>
    <rect x="260" y="166" width="86" height="28" rx="9"/><text x="268" y="184" fill="#9a8f78">RELATIONS</text>
    <rect x="352" y="166" width="66" height="28" rx="9"/><text x="360" y="184" fill="#9a8f78">JOURNAL</text>
    <rect x="424" y="166" width="56" height="28" rx="9"/><text x="432" y="184" fill="#9a8f78">GRAPH</text>
    <rect x="486" y="170" width="1" height="20" fill="#cda84e" fill-opacity="0.22"/>
    <rect x="496" y="166" width="50" height="28" rx="9"/><text x="504" y="184" fill="#9a8f78">VAULT</text>
    <rect x="550" y="166" width="66" height="28" rx="9"/><text x="558" y="184" fill="#9a8f78">CONTEXT</text>
  </g>

  <!-- TOOLBAR: 4 buttons incl. a "..." that hides 17 actions -->
  <g font-family="monospace" font-size="10" letter-spacing="0.5">
    <rect x="64" y="204" width="74" height="26" rx="8" fill="none" stroke="#cda84e" stroke-opacity="0.16"/><text x="74" y="221" fill="#9a8f78">⌕ Search</text>
    <rect x="144" y="204" width="82" height="26" rx="8" fill="none" stroke="#cda84e" stroke-opacity="0.16"/><text x="154" y="221" fill="#9a8f78">⚑ Director</text>
    <rect x="232" y="204" width="96" height="26" rx="8" fill="none" stroke="#cda84e" stroke-opacity="0.16"/><text x="242" y="221" fill="#9a8f78">◈ Customize</text>
    <rect x="334" y="204" width="82" height="26" rx="8" fill="#cda84e" fill-opacity="0.06" stroke="#cda84e" stroke-opacity="0.3"/><text x="344" y="221" fill="#cda84e">⋯ Actions</text>
  </g>

  <!-- CHRONICLE SUB-NAV: a SECOND row of 8 tabs inside a tab -->
  <line x1="40" y1="246" x2="640" y2="246" stroke="#cda84e" stroke-opacity="0.1"/>
  <text x="64" y="272" fill="#9a8f78" font-family="monospace" font-size="9" letter-spacing="1">(inside CHRONICLE tab — a second tab strip:)</text>
  <g font-family="monospace" font-size="10" letter-spacing="0.5">
    <rect x="64" y="282" width="56" height="24" rx="8" fill="#cda84e" fill-opacity="0.18" stroke="#cda84e" stroke-opacity="0.4"/><text x="74" y="298" fill="#cda84e">WORLD</text>
    <rect x="126" y="282" width="68" height="24" rx="8"/><text x="134" y="298" fill="#9a8f78">TIMELINE</text>
    <rect x="200" y="282" width="52" height="24" rx="8"/><text x="208" y="298" fill="#9a8f78">BEATS</text>
    <rect x="258" y="282" width="62" height="24" rx="8"/><text x="266" y="298" fill="#9a8f78">MEMORY</text>
    <rect x="326" y="282" width="78" height="24" rx="8"/><text x="334" y="298" fill="#9a8f78">KNOWLEDGE</text>
    <rect x="410" y="282" width="62" height="24" rx="8"/><text x="418" y="298" fill="#9a8f78">SECRETS</text>
    <rect x="64" y="312" width="52" height="24" rx="8"/><text x="72" y="328" fill="#9a8f78">SCARS</text>
    <rect x="122" y="312" width="54" height="24" rx="8"/><text x="130" y="328" fill="#9a8f78">CODEX</text>
  </g>

  <!-- generic list rows (mem rows) showing uniform density -->
  <g font-family="monospace" font-size="11">
    <rect x="64" y="356" width="552" height="34" rx="0" fill="#1c1813"/>
    <rect x="72" y="364" width="58" height="18" rx="6" fill="none" stroke="#9bc0e6" stroke-opacity="0.4"/><text x="80" y="377" fill="#9bc0e6">CHAPTER</text>
    <text x="142" y="377" fill="#cdbfa0" font-family="Georgia" font-size="13">The siege broke at dawn; Aveline slipped the cordon…</text>
    <rect x="64" y="392" width="552" height="34" fill="#1c1813"/>
    <rect x="72" y="400" width="44" height="18" rx="6" fill="none" stroke="#8c8478" stroke-opacity="0.5"/><text x="80" y="413" fill="#8c8478">TURN</text>
    <text x="128" y="413" fill="#cdbfa0" font-family="Georgia" font-size="13">Coren refused the bribe and walked out…</text>
    <rect x="64" y="428" width="552" height="34" fill="#1c1813"/>
    <rect x="72" y="436" width="44" height="18" rx="6" fill="none" stroke="#cda84e" stroke-opacity="0.4"/><text x="80" y="449" fill="#cda84e">ARC</text>
    <text x="128" y="449" fill="#cdbfa0" font-family="Georgia" font-size="13">The drowning of the chapel district…</text>
  </g>
  <text x="64" y="500" fill="#9a8f78" font-size="12" font-style="italic">…World / Timeline / Memory / Knowledge / Secrets / Scars / Codex all reuse this same</text>
  <text x="64" y="518" fill="#9a8f78" font-size="12" font-style="italic">flat “tier-chip + one line + ✕” row. Seven views, one undifferentiated texture.</text>

  <!-- ANNOTATIONS -->
  <g font-family="monospace" font-size="13" fill="#ff8a8a">
    <line x1="416" y1="180" x2="700" y2="172" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="708" y="168">① 8 tabs, all identical uppercase mono pills.</text>
    <text x="728" y="186" fill="#d8a0a0">No grouping by purpose; “Context” &amp; “Vault”</text>
    <text x="728" y="204" fill="#d8a0a0">(power-user tools) sit beside core views.</text>

    <line x1="375" y1="230" x2="700" y2="250" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="708" y="246">② “⋯ Actions” hides 17 commands in a modal —</text>
    <text x="728" y="264" fill="#d8a0a0">Summarize, Rescan, Undo, Rebuild, Tidy×2,</text>
    <text x="728" y="282" fill="#d8a0a0">Re-summarize, Traverse, Tone, Off-screen, Hide,</text>
    <text x="728" y="300" fill="#d8a0a0">Export/Import/Recover, Clear. Discoverability=0.</text>

    <line x1="404" y1="298" x2="700" y2="346" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="708" y="342">③ Tabs-within-a-tab. Chronicle nests EIGHT more</text>
    <text x="728" y="360" fill="#d8a0a0">views. Two stacked nav strips = the user must</text>
    <text x="728" y="378" fill="#d8a0a0">track two levels of “where am I”. No breadcrumb.</text>

    <line x1="300" y1="328" x2="700" y2="420" stroke="#ff8a8a" stroke-width="1.2" stroke-dasharray="3 3"/>
    <text x="708" y="416">④ 16 destinations total (8 tabs × ~ + 8 subviews)</text>
    <text x="728" y="434" fill="#d8a0a0">with no visual hierarchy between “I read this</text>
    <text x="728" y="452" fill="#d8a0a0">every turn” (Now) and “I touch this monthly”</text>
    <text x="728" y="470" fill="#d8a0a0">(Codex, Context). Everything competes equally.</text>

    <line x1="400" y1="410" x2="700" y2="520" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="708" y="516">⑤ Every list = same row recipe (mono tier-chip +</text>
    <text x="728" y="534" fill="#d8a0a0">one line + ✕). Memory, Knowledge, Secrets, Scars,</text>
    <text x="728" y="552" fill="#d8a0a0">Codex are visually interchangeable — you can’t tell</text>
    <text x="728" y="570" fill="#d8a0a0">which view you’re in without reading the chip text.</text>

    <text x="708" y="616" fill="#cda84e">⑥ Float vs drawer split is confusing: the floating</text>
    <text x="728" y="634" fill="#d8a0a0">window shows ONLY “Now”; all 8 tabs live in the</text>
    <text x="728" y="652" fill="#d8a0a0">drawer. Two entry points (launcher tab + input-bar</text>
    <text x="728" y="670" fill="#d8a0a0">button) for the same panel, doing different things.</text>

    <text x="708" y="712" fill="#cda84e">⑦ Toggles (Traverse/Tone/Hide/Off-screen) live in</text>
    <text x="728" y="730" fill="#d8a0a0">the same menu as one-shot actions (Rebuild) AND</text>
    <text x="728" y="748" fill="#d8a0a0">the destructive Clear. State and verbs are mixed.</text>
  </g>
</svg>
