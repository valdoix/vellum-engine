<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="980" viewBox="0 0 1100 980" font-family="Georgia, serif">
  <defs>
    <radialGradient id="vellum" cx="50%" cy="40%" r="75%">
      <stop offset="0" stop-color="#efe2c0"/><stop offset="0.6" stop-color="#e6d6ac"/><stop offset="1" stop-color="#cdb985"/>
    </radialGradient>
    <linearGradient id="gutter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9c8047" stop-opacity="0"/><stop offset="0.5" stop-color="#3a2c13" stop-opacity="0.55"/><stop offset="1" stop-color="#9c8047" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d2410"/><stop offset="1" stop-color="#211307"/>
    </linearGradient>
    <radialGradient id="seal" cx="40%" cy="35%" r="70%">
      <stop offset="0" stop-color="#b8403a"/><stop offset="1" stop-color="#6e1f1c"/>
    </radialGradient>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>

  <!-- leather binding -->
  <rect width="1100" height="980" fill="url(#leather)"/>
  <rect x="20" y="20" width="1060" height="940" rx="6" fill="none" stroke="#caa24e" stroke-width="2" stroke-opacity="0.5"/>
  <rect x="30" y="30" width="1040" height="920" rx="4" fill="none" stroke="#caa24e" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- the open codex: two pages -->
  <rect x="48" y="48" width="1004" height="884" rx="3" fill="url(#vellum)" filter="url(#rough)"/>
  <rect x="48" y="48" width="1004" height="884" rx="3" fill="url(#vellum)" opacity="0.5"/>
  <!-- center gutter -->
  <rect x="540" y="48" width="20" height="884" fill="url(#gutter)"/>
  <line x1="550" y1="60" x2="550" y2="920" stroke="#2a1d0c" stroke-opacity="0.35" stroke-width="1"/>

  <!-- ribbon bookmark tabs (the "tabs") hanging from top -->
  <g font-family="Georgia" font-size="11" letter-spacing="1">
    <g><rect x="120" y="20" width="70" height="58" fill="#7d2b27"/><path d="M120 78 l35 -14 l35 14 z" fill="#7d2b27"/><text x="155" y="52" fill="#f0d9a8" text-anchor="middle" font-style="italic">Now</text></g>
    <g><rect x="200" y="20" width="70" height="48" fill="#4a5a3a"/><path d="M200 68 l35 -12 l35 12 z" fill="#4a5a3a"/><text x="235" y="48" fill="#e6e2c8" text-anchor="middle" font-style="italic">Cast</text></g>
    <g><rect x="280" y="20" width="80" height="48" fill="#3b4a63"/><path d="M280 68 l40 -12 l40 12 z" fill="#3b4a63"/><text x="320" y="48" fill="#d8e3f0" text-anchor="middle" font-style="italic">Bonds</text></g>
    <g><rect x="370" y="20" width="92" height="48" fill="#5a4a2a"/><path d="M370 68 l46 -12 l46 12 z" fill="#5a4a2a"/><text x="416" y="48" fill="#f0d9a8" text-anchor="middle" font-style="italic">Chronicle</text></g>
  </g>

  <!-- ========== LEFT PAGE: the living scene ========== -->
  <!-- header rubric -->
  <text x="90" y="118" fill="#7d2b27" font-size="15" letter-spacing="4" font-style="italic">❦ Anno xii · the hour of dusk ❦</text>
  <line x1="90" y1="130" x2="510" y2="130" stroke="#7d2b27" stroke-opacity="0.4"/>

  <!-- illuminated drop-cap + scene -->
  <rect x="90" y="150" width="64" height="64" rx="3" fill="#7d2b27"/>
  <rect x="94" y="154" width="56" height="56" rx="2" fill="none" stroke="#f0d9a8" stroke-width="1"/>
  <text x="122" y="200" fill="#f0d9a8" font-size="50" text-anchor="middle" font-style="italic">T</text>
  <text x="166" y="170" fill="#2a1d0c" font-size="18" font-style="italic">he drowned chapel, its</text>
  <text x="166" y="196" fill="#2a1d0c" font-size="18" font-style="italic">lower crypt, where water</text>
  <text x="90" y="232" fill="#2a1d0c" font-size="18" font-style="italic">beads black upon the altar stones.</text>

  <!-- tension as a gilded vine meter -->
  <text x="90" y="272" fill="#6e1f1c" font-size="12" letter-spacing="2">PERIL</text>
  <path d="M150 268 Q170 258 190 268 T230 268 T270 268 T310 268 T350 268" fill="none" stroke="#caa24e" stroke-width="3"/>
  <g fill="#7d2b27"><circle cx="150" cy="268" r="4"/><circle cx="190" cy="268" r="4"/><circle cx="230" cy="268" r="4"/><circle cx="270" cy="268" r="4"/><circle cx="310" cy="268" r="4"/></g>
  <g fill="#caa24e" fill-opacity="0.3"><circle cx="350" cy="268" r="4"/><circle cx="390" cy="268" r="4"/></g>
  <text x="430" y="273" fill="#6e1f1c" font-size="13" font-style="italic">vii of x</text>

  <!-- portrait medallions for present cast -->
  <text x="90" y="318" fill="#6e1f1c" font-size="13" letter-spacing="3" font-style="italic">— THOSE PRESENT —</text>

  <g>
    <circle cx="130" cy="378" r="38" fill="#e6d2a4" stroke="#caa24e" stroke-width="3"/>
    <circle cx="130" cy="378" r="32" fill="none" stroke="#7d2b27" stroke-width="1"/>
    <text x="130" y="388" fill="#5a3a1a" font-size="26" text-anchor="middle" font-style="italic">A</text>
    <!-- gilt halo = present -->
    <circle cx="130" cy="378" r="44" fill="none" stroke="#caa24e" stroke-width="1" stroke-dasharray="2 4" opacity="0.7"/>
    <text x="186" y="362" fill="#2a1d0c" font-size="20">Sister Aveline</text>
    <text x="186" y="384" fill="#7d2b27" font-size="13" font-style="italic">wary · and bleeding still</text>
    <text x="186" y="406" fill="#3a2c13" font-size="14" font-style="italic">“He swore the door was sealed.</text>
    <text x="186" y="424" fill="#3a2c13" font-size="14" font-style="italic"> He lied to me.”</text>
  </g>
  <g>
    <circle cx="130" cy="486" r="34" fill="#e6d2a4" stroke="#caa24e" stroke-width="3"/>
    <text x="130" y="496" fill="#5a3a1a" font-size="24" text-anchor="middle" font-style="italic">C</text>
    <text x="178" y="474" fill="#2a1d0c" font-size="20">Coren</text>
    <text x="178" y="496" fill="#4a5a3a" font-size="13" font-style="italic">guarded · blade half-drawn</text>
    <text x="178" y="518" fill="#3a2c13" font-size="14" font-style="italic">stands between her and the dark.</text>
  </g>

  <!-- marginalia note in the margin -->
  <text x="92" y="600" fill="#6e1f1c" font-size="11" font-style="italic" transform="rotate(-4 92 600)">a second exit, lately</text>
  <text x="92" y="616" fill="#6e1f1c" font-size="11" font-style="italic" transform="rotate(-4 92 616)">discovered — see margin →</text>

  <!-- a sketched ornament -->
  <path d="M90 660 Q120 640 150 660 Q180 680 210 660" fill="none" stroke="#caa24e" stroke-opacity="0.6" stroke-width="1.5"/>

  <!-- the latest entries, as scribal log -->
  <text x="90" y="712" fill="#6e1f1c" font-size="13" letter-spacing="3" font-style="italic">— LATELY WRITTEN —</text>
  <g font-size="14" fill="#2a1d0c" font-style="italic">
    <text x="90" y="742"><tspan fill="#7d2b27" font-style="normal" font-size="11">℣</tspan>  Aveline vows: “I will not kneel to him again.”</text>
    <text x="90" y="768"><tspan fill="#3b4a63" font-style="normal" font-size="11">✦</tspan>  Coren learns of a second exit.</text>
    <text x="90" y="794"><tspan fill="#6e1f1c" font-style="normal" font-size="11">⚿</tspan>  A secret: she bears the Vicar’s seal.</text>
  </g>

  <!-- ========== RIGHT PAGE: bonds as heraldry ========== -->
  <text x="600" y="118" fill="#7d2b27" font-size="15" letter-spacing="4" font-style="italic">❦ Of bonds &amp; their humours ❦</text>
  <line x1="600" y1="130" x2="1010" y2="130" stroke="#7d2b27" stroke-opacity="0.4"/>

  <!-- heraldic bond shield -->
  <g>
    <path d="M600 168 h360 v70 q0 50 -180 86 q-180 -36 -180 -86 z" fill="#e6d2a4" stroke="#caa24e" stroke-width="2.5"/>
    <line x1="780" y1="168" x2="780" y2="300" stroke="#caa24e" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="690" y="160" fill="#2a1d0c" font-size="18" text-anchor="middle" font-style="italic">Aveline</text>
    <text x="870" y="160" fill="#2a1d0c" font-size="18" text-anchor="middle" font-style="italic">Coren</text>
    <!-- left half: her humour toward him -->
    <text x="690" y="200" fill="#4a5a3a" font-size="12" text-anchor="middle" font-style="italic">affection, ardent</text>
    <text x="690" y="222" fill="#caa24e" font-size="20" text-anchor="middle">✶✶✶✶✶✶</text>
    <text x="690" y="248" fill="#6e1f1c" font-size="12" text-anchor="middle" font-style="italic">trust, faint</text>
    <text x="690" y="268" fill="#6e1f1c" font-size="20" text-anchor="middle">✶✶</text>
    <!-- right half: his humour toward her -->
    <text x="870" y="200" fill="#4a5a3a" font-size="12" text-anchor="middle" font-style="italic">affection, devout</text>
    <text x="870" y="222" fill="#caa24e" font-size="20" text-anchor="middle">✶✶✶✶✶✶✶</text>
    <text x="870" y="248" fill="#3b4a63" font-size="12" text-anchor="middle" font-style="italic">trust, growing</text>
    <text x="870" y="268" fill="#3b4a63" font-size="20" text-anchor="middle">✶✶✶✶</text>
  </g>
  <text x="780" y="326" fill="#3a2c13" font-size="13" text-anchor="middle" font-style="italic">a one-sided romance, an even alliance</text>

  <!-- a knot motif divider -->
  <path d="M640 352 q40 -24 80 0 q40 24 80 0 q40 -24 80 0 q40 24 80 0" fill="none" stroke="#caa24e" stroke-opacity="0.6" stroke-width="2"/>

  <!-- the dramatis personae as a roster -->
  <text x="600" y="402" fill="#6e1f1c" font-size="13" letter-spacing="3" font-style="italic">— DRAMATIS PERSONÆ —</text>
  <g font-size="15" fill="#2a1d0c">
    <text x="600" y="436" font-style="italic">Sister Aveline <tspan fill="#7d2b27" font-size="12">— cleric, of four-and-thirty</tspan></text>
    <text x="600" y="466" font-style="italic">Coren <tspan fill="#7d2b27" font-size="12">— sellsword, sworn unwillingly</tspan></text>
    <text x="600" y="496" font-style="italic">The Vicar <tspan fill="#7d2b27" font-size="12">— absent, &amp; the worse for it</tspan></text>
    <line x1="600" y1="478" x2="1010" y2="478" stroke="#caa24e" stroke-opacity="0.25"/>
  </g>

  <!-- knowledge / dramatic irony rendered as a marginal gloss -->
  <text x="600" y="546" fill="#6e1f1c" font-size="13" letter-spacing="3" font-style="italic">— WHAT IS BELIEVED —</text>
  <g font-size="14" fill="#3a2c13" font-style="italic">
    <text x="600" y="578">Coren <tspan fill="#3b4a63" font-style="normal" font-size="11">believes</tspan> the Vicar dead —</text>
    <text x="624" y="600" fill="#6e1f1c">though it is <tspan text-decoration="underline">not so</tspan>.</text>
    <text x="600" y="632">Aveline <tspan fill="#6e1f1c" font-style="normal" font-size="11">once held</tspan> <tspan text-decoration="line-through" fill="#8a6a3a">Coren a traitor</tspan></text>
    <text x="624" y="654" fill="#7d2b27">— a scar, healed but tender.</text>
  </g>

  <!-- wax seal as the "actions" / close affordance, bottom-right -->
  <g>
    <circle cx="940" cy="800" r="48" fill="url(#seal)" stroke="#4a1513" stroke-width="2"/>
    <circle cx="940" cy="800" r="40" fill="none" stroke="#e09b96" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="940" y="794" fill="#f0c4c0" font-size="22" text-anchor="middle" font-style="italic">V</text>
    <text x="940" y="816" fill="#e0a39e" font-size="8" text-anchor="middle" letter-spacing="2">SIGILLVM</text>
  </g>
  <text x="780" y="792" fill="#6e1f1c" font-size="12" font-style="italic" text-anchor="end">press the seal</text>
  <text x="780" y="810" fill="#6e1f1c" font-size="12" font-style="italic" text-anchor="end">to close the book →</text>

  <!-- corner foliage ornaments -->
  <path d="M60 60 q30 0 30 30 M60 60 q0 30 30 30" fill="none" stroke="#caa24e" stroke-opacity="0.5" stroke-width="1.5"/>
  <path d="M1040 60 q-30 0 -30 30 M1040 60 q0 30 -30 30" fill="none" stroke="#caa24e" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- title plate at very bottom -->
  <rect x="430" y="892" width="240" height="40" rx="3" fill="#7d2b27"/>
  <text x="550" y="918" fill="#f0d9a8" font-size="18" text-anchor="middle" letter-spacing="6" font-style="italic">VELLVM · PALIMPSEST</text>

  <!-- caption -->
  <text x="60" y="968" fill="#caa24e" font-size="13" font-style="italic" opacity="0.7">I · FANTASY / HISTORICAL — “The Codex”: an open illuminated manuscript. Ribbon tabs, drop-caps, portrait medallions, heraldic bonds, a wax-seal close.</text>
</svg>
