<svg xmlns="http://www.w3.org/2000/svg" width="980" height="748" viewBox="0 0 980 748" font-family="'Cormorant Garamond',Georgia,serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#241f38"/><stop offset="0.55" stop-color="#1d2230"/><stop offset="1" stop-color="#161d18"/></linearGradient>
    <linearGradient id="cd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2b2c42" stop-opacity="0.9"/><stop offset="1" stop-color="#1e2130" stop-opacity="0.82"/></linearGradient>
    <radialGradient id="med" cx="42%" cy="32%" r="76%"><stop offset="0" stop-color="#4a4266"/><stop offset="1" stop-color="#241f34"/></radialGradient>
    <radialGradient id="cap" cx="50%" cy="30%" r="72%"><stop offset="0" stop-color="#e79ab0"/><stop offset="1" stop-color="#a85a72"/></radialGradient>
    <radialGradient id="bulb" cx="50%" cy="40%" r="60%"><stop offset="0" stop-color="#fff2c4"/><stop offset="1" stop-color="#f0c65a"/></radialGradient>
    <linearGradient id="vine" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a6d6a0"/><stop offset="1" stop-color="#5f9a68"/></linearGradient>
    <filter id="g" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="0.5"/></filter>
  </defs>

  <rect width="980" height="748" fill="url(#bg)"/>
  <!-- faint bokeh fairy lights -->
  <g fill="#ffe6a0"><circle cx="150" cy="640" r="3" opacity="0.5" filter="url(#g)"/><circle cx="880" cy="90" r="4" opacity="0.4" filter="url(#g)"/><circle cx="820" cy="700" r="3" opacity="0.4" filter="url(#g)"/><circle cx="60" cy="120" r="2.5" opacity="0.5" filter="url(#g)"/><circle cx="940" cy="420" r="3" opacity="0.35" filter="url(#g)"/></g>
  <!-- faint leaves -->
  <g fill="#7fae7a" opacity="0.08"><ellipse cx="900" cy="560" rx="30" ry="11" transform="rotate(28 900 560)"/><ellipse cx="70" cy="470" rx="24" ry="9" transform="rotate(-24 70 470)"/></g>

  <text x="32" y="40" fill="#c9b6f0" font-size="21" letter-spacing="0.5" font-style="italic" font-weight="600">Faewild — twilight glade, pastels, fairy lights &amp; climbing vines, radius 22</text>
  <text x="32" y="62" fill="#b0a8cf" font-size="12.5" font-family="-apple-system,sans-serif">Enchanted storybook world. Six new content-safe silhouettes. Present=toadstool · Bonds=vine-clasp · Cast=tarot · Beats=trellis · Factions=bramble · Items=lantern. Fairy lights = tension &amp; presence.</text>

  <!-- PRESENT — toadstool: mushroom-cap dome top, spotted cap band in reserved top padding -->
  <text x="32" y="94" fill="#8fbf88" font-size="10" font-family="monospace" letter-spacing="1">PRESENT · toadstool dome</text>
  <path d="M32 128 Q32 102 176 102 Q320 102 320 128 V222 Q320 242 300 242 H52 Q32 242 32 222 Z" fill="url(#cd)" stroke="#c9b6f0" stroke-opacity="0.28"/>
  <!-- spotted cap band lives in the top padding -->
  <path d="M44 122 Q176 100 308 122" fill="none" stroke="#e79ab0" stroke-opacity="0.5" stroke-width="2"/>
  <g fill="#f0d8ea" opacity="0.7"><circle cx="120" cy="115" r="2.5"/><circle cx="176" cy="110" r="3"/><circle cx="232" cy="115" r="2.5"/></g>
  <circle cx="90" cy="176" r="26" fill="url(#med)" stroke="#a6d6a0" stroke-opacity="0.55"/><circle cx="90" cy="176" r="26" fill="none" stroke="#a6d6a0" stroke-opacity="0.4" filter="url(#g)"/><text x="90" y="183" fill="#ece6f5" font-size="16" text-anchor="middle" font-style="italic">A</text><circle cx="110" cy="156" r="4" fill="#a6d6a0"/>
  <text x="132" y="160" fill="#ece6f5" font-size="15">Aveline</text><text x="132" y="179" fill="#c9b6f0" font-size="10.5" font-style="italic">wary · steady</text>
  <text x="132" y="197" fill="#b0a8cf" font-size="10">turns the seal-ring over</text>
  <text x="118" y="226" fill="#e79ab0" font-size="16" font-style="italic">&#10077;</text><text x="136" y="224" fill="#ece6f5" font-size="10" font-style="italic">If he talks, we're finished.</text>

  <!-- BONDS — vine-clasp: two medallions joined by a climbing tendril -->
  <text x="352" y="94" fill="#8fbf88" font-size="10" font-family="monospace" letter-spacing="1">BONDS · vine-clasp</text>
  <rect x="352" y="102" width="288" height="140" rx="22" fill="url(#cd)" stroke="#a6d6a0" stroke-opacity="0.28"/>
  <circle cx="418" cy="162" r="30" fill="url(#med)" stroke="#a6d6a0" stroke-opacity="0.55"/><text x="418" y="168" fill="#ece6f5" font-size="15" text-anchor="middle" font-style="italic">A</text>
  <circle cx="574" cy="162" r="30" fill="url(#med)" stroke="#e79ab0" stroke-opacity="0.55" stroke-dasharray="4 4"/><text x="574" y="168" fill="#ece6f5" font-size="15" text-anchor="middle" font-style="italic">C</text>
  <!-- climbing vine that clasps them -->
  <path d="M448 150 q26 -18 48 -6 q22 12 48 -6" fill="none" stroke="url(#vine)" stroke-width="2.5"/>
  <path d="M472 142 q-6 -8 2 -12" fill="none" stroke="#a6d6a0" stroke-width="2"/><ellipse cx="470" cy="128" rx="6" ry="3" fill="#a6d6a0" opacity="0.7" transform="rotate(-30 470 128)"/>
  <ellipse cx="520" cy="150" rx="6" ry="3" fill="#8fbf88" opacity="0.7" transform="rotate(20 520 150)"/>
  <text x="496" y="128" fill="#e79ab0" font-size="10" text-anchor="middle" font-style="italic">rivalry</text>
  <text x="496" y="210" fill="#ece6f5" font-size="12" text-anchor="middle">Aveline &amp; Coren</text>
  <text x="496" y="228" fill="#b0a8cf" font-size="9" text-anchor="middle" font-style="italic">tangled close — the vine frays</text>

  <!-- CAST — tarot: tall storybook plate, fairy-light inner border -->
  <text x="672" y="94" fill="#8fbf88" font-size="10" font-family="monospace" letter-spacing="1">CAST · tarot</text>
  <rect x="672" y="102" width="150" height="264" rx="22" fill="url(#cd)" stroke="#c9b6f0" stroke-opacity="0.32"/>
  <rect x="682" y="112" width="130" height="244" rx="16" fill="none" stroke="#c9b6f0" stroke-opacity="0.2" stroke-dasharray="1 7" stroke-linecap="round"/>
  <g fill="#ffe6a0"><circle cx="697" cy="127" r="2" opacity="0.8"/><circle cx="747" cy="112" r="2" opacity="0.8"/><circle cx="797" cy="127" r="2" opacity="0.8"/></g>
  <circle cx="747" cy="186" r="38" fill="url(#med)" stroke="#c9b6f0" stroke-opacity="0.5"/><circle cx="747" cy="186" r="38" fill="none" stroke="#a6d6a0" stroke-opacity="0.35" filter="url(#g)"/><text x="747" y="198" fill="#ece6f5" font-size="26" text-anchor="middle" font-style="italic">V</text>
  <text x="747" y="254" fill="#ece6f5" font-size="15" text-anchor="middle">The Vicar</text>
  <text x="747" y="274" fill="#b0a8cf" font-size="9.5" text-anchor="middle" font-style="italic">keeper of the</text><text x="747" y="288" fill="#b0a8cf" font-size="9.5" text-anchor="middle" font-style="italic">refectory</text>
  <text x="747" y="330" fill="#8fbf88" font-size="9" text-anchor="middle" letter-spacing="2">&#127812; &#127812; &#127812;</text>
  <text x="747" y="348" fill="#8f88b0" font-size="8.5" text-anchor="middle" font-family="monospace">off-screen</text>

  <!-- BEATS — trellis: climbing-vine spine down the left rail -->
  <text x="840" y="94" fill="#8fbf88" font-size="10" font-family="monospace" letter-spacing="1">BEATS · trellis</text>
  <rect x="840" y="102" width="108" height="264" rx="14" fill="url(#cd)" stroke="#a6d6a0" stroke-opacity="0.26"/>
  <!-- vine rail in the left padding -->
  <path d="M852 112 q10 22 0 44 q-10 22 0 44 q10 22 0 44 q-10 22 0 44 q10 22 0 30" fill="none" stroke="url(#vine)" stroke-width="2.5"/>
  <ellipse cx="846" cy="150" rx="6" ry="3" fill="#a6d6a0" opacity="0.7" transform="rotate(-40 846 150)"/><ellipse cx="858" cy="238" rx="6" ry="3" fill="#8fbf88" opacity="0.7" transform="rotate(40 858 238)"/><ellipse cx="846" cy="322" rx="6" ry="3" fill="#a6d6a0" opacity="0.7" transform="rotate(-40 846 322)"/>
  <text x="870" y="128" fill="#a6d6a0" font-size="8" letter-spacing="1">&#9873; 01</text>
  <text x="870" y="150" fill="#ece6f5" font-size="11" font-style="italic">The ring</text><text x="870" y="166" fill="#ece6f5" font-size="11" font-style="italic">changes</text><text x="870" y="182" fill="#ece6f5" font-size="11" font-style="italic">hands</text>
  <line x1="870" y1="196" x2="936" y2="196" stroke="#a6d6a0" stroke-opacity="0.2"/>
  <text x="870" y="216" fill="#b0a8cf" font-size="9">at the well</text>
  <text x="870" y="250" fill="#a6d6a0" font-size="8" letter-spacing="1">&#9670; 02</text>
  <text x="870" y="272" fill="#ece6f5" font-size="11" font-style="italic">Refectory</text><text x="870" y="288" fill="#ece6f5" font-size="11" font-style="italic">confront.</text>

  <!-- FACTIONS — bramble: leafy wreath in the corners -->
  <text x="32" y="290" fill="#8fbf88" font-size="10" font-family="monospace" letter-spacing="1">FACTIONS · bramble wreath</text>
  <rect x="32" y="298" width="288" height="136" rx="22" fill="url(#cd)" stroke="#8fbf88" stroke-opacity="0.28"/>
  <!-- corner brambles in reserved padding -->
  <path d="M48 314 q18 -6 26 8" fill="none" stroke="url(#vine)" stroke-width="2"/><ellipse cx="52" cy="312" rx="5" ry="2.5" fill="#a6d6a0" opacity="0.7" transform="rotate(-30 52 312)"/>
  <path d="M304 418 q-18 6 -26 -8" fill="none" stroke="url(#vine)" stroke-width="2"/><ellipse cx="300" cy="420" rx="5" ry="2.5" fill="#8fbf88" opacity="0.7" transform="rotate(-30 300 420)"/>
  <circle cx="86" cy="356" r="22" fill="url(#med)" stroke="#8fbf88" stroke-opacity="0.5"/><text x="86" y="362" fill="#a6d6a0" font-size="14" text-anchor="middle">&#127807;</text>
  <text x="120" y="344" fill="#ece6f5" font-size="14">Harbor Guild</text>
  <rect x="120" y="356" width="150" height="6" rx="3" fill="#a6d6a0" fill-opacity="0.15"/><rect x="120" y="356" width="98" height="6" rx="3" fill="#8fbf88"/>
  <text x="120" y="384" fill="#b0a8cf" font-size="9.5">members: Aveline · 3 dockhands</text>
  <text x="120" y="402" fill="#8f88b0" font-size="9" font-style="italic">seat: The Salt Docks</text>

  <!-- ITEMS — lantern: hanging tag with a top hook + warm glow -->
  <text x="352" y="290" fill="#8fbf88" font-size="10" font-family="monospace" letter-spacing="1">ITEMS · fairy lantern</text>
  <!-- hook + string in top padding -->
  <path d="M476 300 q0 -10 8 -12" fill="none" stroke="#c9a24a" stroke-width="1.5"/><circle cx="486" cy="288" r="4" fill="none" stroke="#c9a24a" stroke-width="1.5"/>
  <rect x="352" y="308" width="248" height="128" rx="18" fill="url(#cd)" stroke="#f0c65a" stroke-opacity="0.32"/>
  <rect x="352" y="308" width="248" height="128" rx="18" fill="#ffe6a0" fill-opacity="0.04"/>
  <!-- warm glow from a bulb -->
  <circle cx="410" cy="372" r="24" fill="url(#bulb)" opacity="0.9"/><circle cx="410" cy="372" r="30" fill="#ffe6a0" opacity="0.25" filter="url(#g)"/><text x="410" y="378" fill="#6a4a10" font-size="16" text-anchor="middle">&#9906;</text>
  <text x="452" y="344" fill="#ece6f5" font-size="14">The seal-ring</text>
  <text x="452" y="366" fill="#b0a8cf" font-size="10">Aveline &#8594; Coren</text>
  <text x="452" y="388" fill="#8f88b0" font-size="9" font-family="monospace">3 hands · T138</text>
  <text x="452" y="414" fill="#f0c65a" font-size="9" font-style="italic">held · glows when carried</text>

  <!-- TENSION — fairy-light string: bulbs light left-to-right -->
  <text x="632" y="290" fill="#8fbf88" font-size="10" font-family="monospace" letter-spacing="1">TENSION · fairy-light string</text>
  <rect x="632" y="298" width="296" height="136" rx="22" fill="url(#cd)" stroke="#c9b6f0" stroke-opacity="0.28"/>
  <text x="652" y="326" fill="#ece6f5" font-size="12">Tension</text><text x="908" y="326" fill="#e79ab0" font-size="10" text-anchor="end" font-style="italic">6/10 rising</text>
  <!-- draped wire -->
  <path d="M660 356 Q700 380 740 356 T820 356 T900 356" fill="none" stroke="#5f9a68" stroke-width="1.5" opacity="0.6"/>
  <g>
    <circle cx="668" cy="360" r="7" fill="url(#bulb)"/><circle cx="668" cy="360" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#g)"/>
    <circle cx="708" cy="368" r="7" fill="url(#bulb)"/><circle cx="708" cy="368" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#g)"/>
    <circle cx="748" cy="360" r="7" fill="url(#bulb)"/><circle cx="748" cy="360" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#g)"/>
    <circle cx="788" cy="368" r="7" fill="#f0a05a"/>
    <circle cx="828" cy="360" r="7" fill="#e07a94"/>
    <circle cx="868" cy="368" r="7" fill="#4a3f56" stroke="#c9b6f0" stroke-opacity="0.3"/>
    <circle cx="900" cy="360" r="7" fill="#3a3448" stroke="#c9b6f0" stroke-opacity="0.25"/>
  </g>
  <text x="652" y="406" fill="#b0a8cf" font-size="10" font-style="italic">the glade brightens — more lights catch as the charge rises</text>

  <!-- state matrix strip -->
  <text x="32" y="482" fill="#c9b6f0" font-family="monospace" font-size="11" letter-spacing="1">STATE MATRIX — shape stays, the ornament speaks the state (shown on the toadstool)</text>
  <!-- present -->
  <path d="M32 500 Q32 494 96 494 Q160 494 160 500 V572 Q160 580 152 580 H40 Q32 580 32 572 Z" fill="url(#cd)" stroke="#a6d6a0" stroke-opacity="0.4"/>
  <circle cx="66" cy="540" r="18" fill="url(#med)" stroke="#a6d6a0" stroke-opacity="0.6"/><circle cx="66" cy="540" r="18" fill="none" stroke="#a6d6a0" stroke-opacity="0.5" filter="url(#g)"/><text x="66" y="546" fill="#ece6f5" font-size="12" text-anchor="middle" font-style="italic">A</text><circle cx="80" cy="526" r="3.5" fill="#a6d6a0"/>
  <text x="94" y="534" fill="#ece6f5" font-size="11">present</text><text x="94" y="550" fill="#a6d6a0" font-size="8" font-family="monospace">&#9673; here</text>
  <text x="94" y="566" fill="#8f88b0" font-size="8">firefly + cap glow</text>
  <!-- harmed -->
  <path d="M176 500 Q176 494 240 494 Q304 494 304 500 V572 Q304 580 296 580 H184 Q176 580 176 572 Z" fill="url(#cd)" stroke="#e79ab0" stroke-opacity="0.45"/>
  <circle cx="210" cy="540" r="18" fill="url(#med)" stroke="#e79ab0" stroke-opacity="0.7" stroke-dasharray="4 4"/><text x="210" y="546" fill="#ece6f5" font-size="12" text-anchor="middle" font-style="italic">A</text>
  <text x="238" y="534" fill="#ece6f5" font-size="11">harmed</text><text x="238" y="550" fill="#e79ab0" font-size="8" font-family="monospace">&#9888; hurt</text>
  <text x="238" y="566" fill="#8f88b0" font-size="8">falling-petal ring</text>
  <!-- absent -->
  <g opacity="0.55"><path d="M320 500 Q320 494 384 494 Q448 494 448 500 V572 Q448 580 440 580 H328 Q320 580 320 572 Z" fill="url(#cd)"/>
  <circle cx="354" cy="540" r="18" fill="url(#med)" stroke="#8f88b0" stroke-opacity="0.4"/><text x="354" y="546" fill="#b0a8cf" font-size="12" text-anchor="middle" font-style="italic">A</text>
  <text x="382" y="534" fill="#b0a8cf" font-size="11">absent</text><text x="382" y="550" fill="#8f88b0" font-size="8" font-family="monospace">&#9675; away</text>
  <text x="382" y="566" fill="#8f88b0" font-size="8">lights dim out</text></g>
  <!-- lead -->
  <path d="M464 500 Q464 494 528 494 Q592 494 592 500 V572 Q592 580 584 580 H472 Q464 580 464 572 Z" fill="url(#cd)" stroke="#f0c65a" stroke-opacity="0.5"/>
  <path d="M464 500 Q464 494 528 494 Q592 494 592 500 V572 Q592 580 584 580 H472 Q464 580 464 572 Z" fill="#ffe6a0" fill-opacity="0.04"/>
  <circle cx="498" cy="540" r="18" fill="url(#med)" stroke="#f0c65a" stroke-opacity="0.8"/><circle cx="498" cy="540" r="18" fill="none" stroke="#f0c65a" stroke-opacity="0.5" filter="url(#g)"/><text x="498" y="546" fill="#ece6f5" font-size="12" text-anchor="middle" font-style="italic">A</text><text x="498" y="518" fill="#f0c65a" font-size="9" text-anchor="middle">&#10022;</text>
  <text x="526" y="534" fill="#ece6f5" font-size="11">lead</text><text x="526" y="550" fill="#f0c65a" font-size="8" font-family="monospace">&#9733; star</text>
  <text x="526" y="566" fill="#8f88b0" font-size="8">crowned firefly halo</text>
  <!-- changed -->
  <path d="M608 500 Q608 494 680 494 Q752 494 752 500 V572 Q752 580 744 580 H616 Q608 580 608 572 Z" fill="url(#cd)" stroke="#a6d6a0" stroke-opacity="0.45"/>
  <circle cx="642" cy="540" r="18" fill="url(#med)" stroke="#a6d6a0" stroke-opacity="0.6"/><text x="642" y="546" fill="#ece6f5" font-size="12" text-anchor="middle" font-style="italic">A</text><circle cx="658" cy="524" r="5" fill="#a6d6a0" filter="url(#g)"/>
  <text x="670" y="534" fill="#ece6f5" font-size="11">changed</text><text x="670" y="550" fill="#a6d6a0" font-size="8" font-family="monospace">&#8623; this turn</text>
  <text x="670" y="566" fill="#8f88b0" font-size="8">brief bloom (honors --vmotion)</text>

  <text x="32" y="628" fill="#b0a8cf" font-size="11" font-family="-apple-system,sans-serif" font-style="italic">Faewild dresses each shape as a nature object: a toadstool dome, a vine-clasp, a trellis rail, a bramble wreath, a hanging fairy lantern.</text>
  <text x="32" y="646" fill="#b0a8cf" font-size="11" font-family="-apple-system,sans-serif" font-style="italic">Presence &amp; tension read as fairy lights catching in the dark; harm/rivalry reads as falling petals. Every ornament sits in reserved padding —</text>
  <text x="32" y="664" fill="#b0a8cf" font-size="11" font-family="-apple-system,sans-serif" font-style="italic">vines climb the edge, bulbs drape the top, leaves tuck into corners — so no wide row ever clips its content. Soft serif on twilight glade.</text>
  <text x="32" y="700" fill="#8fbf88" font-size="12" letter-spacing="1" font-style="italic">Six silhouettes grown, not cut: the shape sets the fairy tale, the fairy lights always tell the state.</text>
</svg>
