<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1500" viewBox="0 0 1320 1500" font-family="Georgia, serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c1813"/><stop offset="1" stop-color="#14110c"/></linearGradient>
    <linearGradient id="cardhot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#241713"/><stop offset="1" stop-color="#14110c"/></linearGradient>
    <linearGradient id="affgrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6f8a5e"/><stop offset="1" stop-color="#a9c089"/></linearGradient>
    <linearGradient id="trugrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6f94b6"/><stop offset="1" stop-color="#9bc0e6"/></linearGradient>
  </defs>

  <rect width="1320" height="1500" fill="#26221b"/>
  <text x="40" y="46" fill="#cda84e" font-size="25" letter-spacing="2">RELATIONS REFACTOR — Now block &amp; Bonds tab</text>
  <text x="40" y="72" fill="#9a8f78" font-size="15" font-style="italic">One shared bond component. Asymmetry made the headline. Present-layer only — no engine, schema, or event-log change.</text>

  <!-- =========================================================== -->
  <!-- LEFT COLUMN: TODAY -->
  <!-- =========================================================== -->
  <text x="40" y="120" fill="#ff8a8a" font-family="monospace" font-size="13" letter-spacing="1">TODAY — the problems</text>

  <!-- current bonds card (redrawn from relations.ts) -->
  <g>
    <rect x="40" y="136" width="560" height="286" rx="9" fill="url(#card)" stroke="#cda84e" stroke-opacity="0.18"/>
    <text x="58" y="164" fill="#f2e4bd" font-size="17">Aveline ⇄ Coren</text>
    <text x="360" y="163" fill="#cda84e" font-family="monospace" font-size="10" letter-spacing="1">UNEASY ROMANCE</text>
    <g font-family="monospace" font-size="12" fill="#9a8f78"><text x="556" y="164" text-anchor="end">🔒 ✎ ✕</text></g>

    <!-- bondMeter: affection axis, 2 rows, repeated captions -->
    <text x="58" y="192" fill="#9a8f78" font-family="monospace" font-size="9" letter-spacing="1">AFFECTION</text>
    <line x1="330" y1="198" x2="330" y2="248" stroke="#fff" stroke-opacity="0.2" stroke-dasharray="2 3"/>
    <text x="58" y="216" fill="#cdbfa0" font-size="12">Aveline → Coren</text>
    <rect x="330" y="209" width="120" height="8" rx="4" fill="url(#affgrad)"/><text x="458" y="217" fill="#a9c089" font-family="monospace" font-size="10">+56</text>
    <text x="58" y="234" fill="#cdbfa0" font-size="12">Coren → Aveline</text>
    <rect x="330" y="227" width="150" height="8" rx="4" fill="url(#affgrad)" opacity="0.8"/><text x="488" y="235" fill="#a9c089" font-family="monospace" font-size="10">+72</text>

    <text x="58" y="262" fill="#9a8f78" font-family="monospace" font-size="9" letter-spacing="1">TRUST</text>
    <line x1="330" y1="268" x2="330" y2="318" stroke="#fff" stroke-opacity="0.2" stroke-dasharray="2 3"/>
    <text x="58" y="286" fill="#cdbfa0" font-size="12">Aveline → Coren</text>
    <rect x="288" y="279" width="42" height="8" rx="4" fill="#c96a6a"/><text x="250" y="287" fill="#e09090" font-family="monospace" font-size="10">−20</text>
    <text x="58" y="304" fill="#cdbfa0" font-size="12">Coren → Aveline</text>
    <rect x="330" y="297" width="84" height="8" rx="4" fill="url(#trugrad)"/><text x="422" y="305" fill="#9bc0e6" font-family="monospace" font-size="10">+40</text>

    <!-- direction lines -->
    <line x1="58" y1="324" x2="582" y2="324" stroke="#cda84e" stroke-opacity="0.12"/>
    <text x="58" y="346" fill="#cdbfa0" font-size="12">Aveline → Coren · guarded · “the knight who lied”</text>
    <text x="58" y="366" fill="#cdbfa0" font-size="12">Coren → Aveline · devoted · “the cleric I failed”</text>
    <g font-family="monospace"><text x="58" y="392" fill="#8fa67e" font-size="11">▸ change history</text></g>
    <text x="58" y="412" fill="#9a8f78" font-size="11" font-style="italic">▸ familial   ▸ alliance   (category foot)</text>
  </g>

  <g font-family="Georgia" font-size="12" fill="#c98a8a">
    <text x="40" y="446">1. The caption “Aveline → Coren” is printed <tspan fill="#ffb0b0">four times</tspan> per pair. The</text>
    <text x="56" y="463">120px caption column devours width in the narrow drawer.</text>
    <text x="40" y="484">2. The one-word <tspan fill="#ffb0b0">verdict averages both directions</tspan> — so it hides the very</text>
    <text x="56" y="501">asymmetry (she guarded, he devoted) that is the engine’s signature.</text>
    <text x="40" y="522">3. Sentiment word (per direction) + verdict word (per pair) = two</text>
    <text x="56" y="539">overlapping summaries fighting for the same job.</text>
    <text x="40" y="560">4. The best asset — the dual aff/trust <tspan fill="#ffb0b0">sparkline “arc of the bond”</tspan> —</text>
    <text x="56" y="577">is buried inside a collapsed &lt;details&gt; almost nobody opens.</text>
    <text x="40" y="598">5. Now-tab (vld-rel) and Bonds-tab (vle-rel-*) are <tspan fill="#ffb0b0">two code paths</tspan></text>
    <text x="56" y="615">rendering the same concept with divergent markup that drift apart.</text>
    <text x="40" y="636">6. Card is ~290px tall: header + 4 bars + 2 lines + foot + history</text>
    <text x="56" y="653">all stack. Three bonds and you are scrolling.</text>
  </g>

  <!-- =========================================================== -->
  <!-- RIGHT COLUMN: REDESIGN — the shared BondCard -->
  <!-- =========================================================== -->
  <text x="660" y="120" fill="#9fd08a" font-family="monospace" font-size="13" letter-spacing="1">REDESIGN — one shared &lt;BondCard&gt;, three densities</text>

  <!-- FULL density (Bonds tab, expanded) -->
  <g>
    <rect x="660" y="136" width="620" height="330" rx="11" fill="url(#card)" stroke="#8fa67e" stroke-opacity="0.32"/>
    <!-- warmth spine: tension/sentiment color the left edge, like cast cards -->
    <rect x="660" y="136" width="4" height="330" rx="2" fill="#b48ed0"/>

    <!-- header: pair + asymmetry-aware dual verdict -->
    <text x="682" y="166" fill="#f2e4bd" font-size="18">Aveline <tspan fill="#cda84e">⇄</tspan> Coren</text>
    <g font-family="monospace" font-size="12" fill="#9a8f78"><text x="1258" y="166" text-anchor="end">🔒  ✎  ✕</text></g>
    <!-- the twist: TWO verdicts side by side when asymmetric -->
    <rect x="682" y="178" width="4" height="14" fill="#8fa67e"/>
    <text x="694" y="190" fill="#a9c089" font-family="monospace" font-size="11">SHE: guarded</text>
    <rect x="820" y="178" width="4" height="14" fill="#9bc0e6"/>
    <text x="832" y="190" fill="#9bc0e6" font-family="monospace" font-size="11">HE: devoted</text>
    <text x="980" y="190" fill="#9a7ab0" font-family="monospace" font-size="10" font-style="italic">↯ asymmetric romance</text>

    <!-- ONE dumbbell row per axis: two dots on a single shared track -->
    <text x="682" y="228" fill="#8fa67e" font-family="monospace" font-size="10" letter-spacing="1">AFFECTION</text>
    <line x1="920" y1="216" x2="920" y2="252" stroke="#fff" stroke-opacity="0.16" stroke-dasharray="2 3"/>
    <text x="915" y="212" fill="#6f6655" font-family="monospace" font-size="8">0</text>
    <!-- track -->
    <rect x="740" y="234" width="500" height="4" rx="2" fill="#fff" fill-opacity="0.06"/>
    <!-- connector between the two directional dots = the "gap" of asymmetry -->
    <line x1="985" y1="236" x2="1065" y2="236" stroke="#8fa67e" stroke-width="2" stroke-opacity="0.5"/>
    <circle cx="985" cy="236" r="6" fill="#8fa67e"/><text x="985" y="222" fill="#a9c089" font-family="monospace" font-size="9" text-anchor="middle">A→C +56</text>
    <circle cx="1065" cy="236" r="6" fill="#a9c089"/><text x="1065" y="256" fill="#a9c089" font-family="monospace" font-size="9" text-anchor="middle">C→A +72</text>

    <text x="682" y="288" fill="#9bc0e6" font-family="monospace" font-size="10" letter-spacing="1">TRUST</text>
    <line x1="920" y1="276" x2="920" y2="312" stroke="#fff" stroke-opacity="0.16" stroke-dasharray="2 3"/>
    <rect x="740" y="294" width="500" height="4" rx="2" fill="#fff" fill-opacity="0.06"/>
    <line x1="835" y1="296" x2="985" y2="296" stroke="#c96a6a" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="3 2"/>
    <circle cx="835" cy="296" r="6" fill="#c96a6a"/><text x="835" y="282" fill="#e09090" font-family="monospace" font-size="9" text-anchor="middle">A→C −20</text>
    <circle cx="985" cy="296" r="6" fill="#9bc0e6"/><text x="985" y="312" fill="#9bc0e6" font-family="monospace" font-size="9" text-anchor="middle">C→A +40</text>

    <!-- the sparkline promoted OUT of the disclosure, small + always on -->
    <line x1="682" y1="326" x2="1258" y2="326" stroke="#cda84e" stroke-opacity="0.12"/>
    <text x="682" y="346" fill="#9a8f78" font-family="monospace" font-size="9" letter-spacing="1">ARC OF THE BOND · t120→t147</text>
    <rect x="682" y="352" width="576" height="52" rx="6" fill="#000" fill-opacity="0.18"/>
    <line x1="690" y1="378" x2="1250" y2="378" stroke="#fff" stroke-opacity="0.14" stroke-dasharray="3 3"/>
    <polyline points="690,392 760,388 830,384 900,372 970,360 1040,366 1110,358 1180,352 1250,356" fill="none" stroke="#a9c089" stroke-width="1.6"/>
    <polyline points="690,372 760,376 830,382 900,388 970,384 1040,378 1110,382 1180,376 1250,372" fill="none" stroke="#cda84e" stroke-width="1.6"/>
    <text x="690" y="366" fill="#a9c089" font-family="monospace" font-size="8">— affection</text>
    <text x="770" y="366" fill="#cda84e" font-family="monospace" font-size="8">— trust</text>
    <!-- labels (quotes / cats) fold to a quiet foot -->
    <text x="682" y="428" fill="#cdbfa0" font-size="12" font-style="italic">“the knight who lied” · “the cleric I failed”</text>
    <g font-family="monospace" font-size="9"><rect x="682" y="440" width="70" height="16" rx="4" fill="none" stroke="#b48ed0" stroke-opacity="0.5"/><text x="691" y="452" fill="#c9a9d8">ROMANTIC</text>
    <rect x="762" y="440" width="66" height="16" rx="4" fill="none" stroke="#8fa67e" stroke-opacity="0.5"/><text x="771" y="452" fill="#a9c089">ALLIANCE</text></g>
  </g>
  <text x="660" y="486" fill="#9fd08a" font-family="monospace" font-size="11">FULL — Bonds tab. One dumbbell per axis; the line between dots IS the asymmetry.</text>

  <!-- COMPACT density (Now tab) -->
  <g>
    <rect x="660" y="506" width="620" height="112" rx="10" fill="url(#card)" stroke="#cda84e" stroke-opacity="0.2"/>
    <rect x="660" y="506" width="4" height="112" rx="2" fill="#b48ed0"/>
    <text x="682" y="534" fill="#f2e4bd" font-size="16">Aveline <tspan fill="#cda84e">⇄</tspan> Coren</text>
    <text x="1258" y="534" fill="#9a7ab0" font-family="monospace" font-size="10" font-style="italic" text-anchor="end">↯ asymmetric</text>
    <!-- two mini dumbbells, no per-dot labels; value on hover -->
    <text x="682" y="566" fill="#8fa67e" font-family="monospace" font-size="9">AFF</text>
    <rect x="740" y="561" width="500" height="4" rx="2" fill="#fff" fill-opacity="0.06"/>
    <line x1="990" y1="563" x2="990" y2="563"/>
    <line x1="985" y1="563" x2="1065" y2="563" stroke="#8fa67e" stroke-width="2" stroke-opacity="0.5"/>
    <circle cx="985" cy="563" r="5" fill="#8fa67e"/><circle cx="1065" cy="563" r="5" fill="#a9c089"/>
    <line x1="990" y1="556" x2="990" y2="600" stroke="#fff" stroke-opacity="0.14" stroke-dasharray="2 3"/>
    <text x="682" y="594" fill="#9bc0e6" font-family="monospace" font-size="9">TRU</text>
    <rect x="740" y="589" width="500" height="4" rx="2" fill="#fff" fill-opacity="0.06"/>
    <line x1="835" y1="591" x2="985" y2="591" stroke="#c96a6a" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="3 2"/>
    <circle cx="835" cy="591" r="5" fill="#c96a6a"/><circle cx="985" cy="591" r="5" fill="#9bc0e6"/>
  </g>
  <text x="660" y="638" fill="#9fd08a" font-family="monospace" font-size="11">COMPACT — Now tab. Same component, labels off, history off. Reads in one glance.</text>

  <!-- STRIP density (dense list / big cast) -->
  <g>
    <rect x="660" y="658" width="620" height="40" rx="8" fill="rgba(0,0,0,0.15)" stroke="#cda84e" stroke-opacity="0.14"/>
    <rect x="660" y="658" width="3" height="40" fill="#b48ed0"/>
    <text x="680" y="683" fill="#f2e4bd" font-size="14">Aveline <tspan fill="#cda84e">⇄</tspan> Coren</text>
    <!-- two-axis bond dots reused (affection=fill, trust=ring) -->
    <circle cx="900" cy="678" r="6" fill="#8fa67e" stroke="#c96a6a" stroke-width="1.5" stroke-dasharray="2 2"/>
    <text x="915" y="682" fill="#9a8f78" font-family="monospace" font-size="9">she</text>
    <circle cx="965" cy="678" r="6" fill="#a9c089" stroke="#cda84e" stroke-width="1.5"/>
    <text x="980" y="682" fill="#9a8f78" font-family="monospace" font-size="9">he</text>
    <text x="1258" y="682" fill="#9a7ab0" font-family="monospace" font-size="10" text-anchor="end" font-style="italic">asymmetric romance</text>
  </g>
  <text x="660" y="718" fill="#9fd08a" font-family="monospace" font-size="11">STRIP — reuses the existing two-axis bondDot (fill=aff, ring=trust). For dense lists.</text>

  <!-- =========================================================== -->
  <!-- BOTTOM: the ideas, enumerated -->
  <!-- =========================================================== -->
  <line x1="40" y1="760" x2="1280" y2="760" stroke="#cda84e" stroke-opacity="0.25"/>
  <text x="40" y="792" fill="#cda84e" font-size="19" letter-spacing="1">The refactor, in seven moves</text>

  <g font-family="Georgia" font-size="13.5" fill="#cdbfa0">
    <text x="40" y="828" fill="#f2e4bd" font-size="15">A · One component, three densities.</text>
    <text x="56" y="850">Collapse the Now-tab (vld-rel) and Bonds-tab (vle-rel-*) paths into a single bondCard(state, group,</text>
    <text x="56" y="870">{density}). density: 'full' | 'compact' | 'strip'. Now renders compact; Bonds renders full; big lists</text>
    <text x="56" y="890">render strip. Kills the drift between two code paths and one shared CSS block styles all three.</text>

    <text x="40" y="924" fill="#f2e4bd" font-size="15">B · Make asymmetry the headline, not a footnote.</text>
    <text x="56" y="946">Replace the single averaged verdict with a per-direction read (“SHE: guarded / HE: devoted”) and an</text>
    <text x="56" y="966">explicit ↯ asymmetric badge when the two directions disagree in sign. This is the engine’s whole</text>
    <text x="56" y="986">selling point (infatuation vs respect); the UI should lead with it, not average it away.</text>

    <text x="40" y="1020" fill="#f2e4bd" font-size="15">C · The dumbbell meter: one track per axis, not one bar per direction.</text>
    <text x="56" y="1042">Both directional scores become two dots on ONE shared track from the center zero. The connecting</text>
    <text x="56" y="1062">segment literally draws the gap between them — a long connector = a lopsided bond. Halves the row</text>
    <text x="56" y="1082">count (2 rows, not 4), removes the repeated caption column, and encodes asymmetry as length.</text>

    <text x="40" y="1116" fill="#f2e4bd" font-size="15">D · Promote the sparkline out of the disclosure.</text>
    <text x="56" y="1138">The dual aff/trust “arc of the bond” is the most expressive thing here and it’s hidden. Show a small,</text>
    <text x="56" y="1158">always-on version in full density (motion-free, pure SVG). Keep the verbose score/category trail rows</text>
    <text x="56" y="1178">inside &lt;details&gt; for those who want the numbers.</text>

    <text x="40" y="1212" fill="#f2e4bd" font-size="15">E · Demote the redundant text.</text>
    <text x="56" y="1234">Per-direction sentiment word is now the verdict (move B), so drop it as a separate field. Labels</text>
    <text x="56" y="1254">(“the knight who lied”) and category chips fold to a single quiet foot line — shown in full only.</text>

    <text x="40" y="1288" fill="#f2e4bd" font-size="15">F · A warmth spine, consistent with cast cards.</text>
    <text x="56" y="1310">Color the 4px left edge by dominant category/sentiment (romantic=violet, rivalry=red, alliance=sage)</text>
    <text x="56" y="1330">so a bond’s nature is legible before reading — mirroring the existing .vle-card--* status spine.</text>

    <text x="40" y="1364" fill="#f2e4bd" font-size="15">G · Keep every chrome + safety invariant.</text>
    <text x="56" y="1386">Futuristic keeps its radar (it already encodes both axes as vectors — no change). The dumbbell is the</text>
    <text x="56" y="1406">default/others path. All values keep mono numerals + hover tooltips (never lossy); reduced-motion and</text>
    <text x="56" y="1426">data-vle-motion are respected (the sparkline is static). Presentation-only: no event, reducer, or schema touch.</text>
  </g>

  <text x="40" y="1466" fill="#cda84e" font-size="12" font-style="italic">Scope: format.ts (new bondCard + dumbbell helper), dashboard.ts &amp; relations.ts (call the shared component), styles.ts (one .vle-bc block). Verify on a real build.</text>
</svg>
