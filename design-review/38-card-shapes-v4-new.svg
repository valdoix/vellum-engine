<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="1360" viewBox="0 0 1120 1360" font-family="'Segoe UI',system-ui,sans-serif">
  <!-- =====================================================================
       CARD SHAPES v4 - EIGHT MORE CONTENT-SAFE TREATMENTS (mockup 38)
       Same grounded rule as v2/v3: a VELLUM card is a WIDE HORIZONTAL ROW
       (~320x72 shown; real ratios 1.2..6.7). The silhouette lives on
       EDGES / CORNERS / an inset frame / a masked edge, and every decoration
       sits in RESERVED PADDING so text/avatars/buttons never touch it.
       No full-bleed clip-path ever crosses the content box.
       Each sample carries a placeholder avatar dot + two text lines + a
       control dot to prove nothing is occluded.
       ===================================================================== -->
  <defs>
    <style>
      .bg{fill:#141210}
      .title{fill:#e7d6ad;font-size:22px;font-weight:700;letter-spacing:2px}
      .cap{fill:#cda84e;font-size:15px;font-weight:600;letter-spacing:.5px}
      .sub{fill:#9a8f78;font-size:12px}
      .card{fill:#1c1914;stroke:#3a3222;stroke-width:1}
      .accent{fill:#cda84e}
      .ink{fill:#e7d6ad}
      .av{fill:#3a331f;stroke:#cda84e;stroke-width:1.5}
      .line{fill:#5a5240}
      .ctl{fill:#4a4230}
      .g{stroke:#cda84e;stroke-width:2;fill:none;opacity:.65}
      .g1{stroke:#cda84e;stroke-width:1;fill:none;opacity:.55}
    </style>
  </defs>

  <rect class="bg" width="1120" height="1360"/>
  <text class="title" x="40" y="52">VELLUM · CARD SHAPES v4 · eight more content-safe treatments</text>
  <text class="sub" x="40" y="78">drawn at the real common row size 320×72 · decoration lives in reserved padding · nothing clips content</text>

  <!-- ============ ROW 1 ============ -->

  <!-- 1. MARGIN : a ruled left margin line (notebook), text starts past it -->
  <g transform="translate(40,120)">
    <text class="cap" x="0" y="-14">margin</text>
    <text class="sub" x="85" y="-14">ruled notebook margin · left padding clears it</text>
    <rect class="card" width="320" height="72" rx="7"/>
    <line x1="22" y1="6" x2="22" y2="66" stroke="#c96a6a" stroke-width="1.5" opacity=".55"/>
    <circle class="av" cx="52" cy="36" r="14"/>
    <rect class="line" x="76" y="22" width="150" height="9" rx="2"/>
    <rect class="line" x="76" y="40" width="200" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="300" cy="22" r="5"/>
  </g>

  <!-- 2. BRACKET : square brackets on the two vertical ends only -->
  <g transform="translate(420,120)">
    <text class="cap" x="0" y="-14">bracket</text>
    <text class="sub" x="90" y="-14">end brackets [ … ] · in side padding</text>
    <rect class="card" width="320" height="72" rx="4"/>
    <path class="g" d="M12 10 h-6 v52 h6 M308 10 h6 v52 h-6"/>
    <circle class="av" cx="46" cy="36" r="14"/>
    <rect class="line" x="70" y="22" width="150" height="9" rx="2"/>
    <rect class="line" x="70" y="40" width="180" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="290" cy="22" r="5"/>
  </g>

  <!-- 3. STITCH : an inset dashed 'stitched' border, sits in the padding -->
  <g transform="translate(800,120)">
    <text class="cap" x="0" y="-14">stitch</text>
    <text class="sub" x="70" y="-14">inset dashed stitch · bloom/cozy</text>
    <rect class="card" width="320" height="72" rx="10"/>
    <rect x="6" y="6" width="308" height="60" rx="7" class="g1" stroke-dasharray="4 3"/>
    <circle class="av" cx="42" cy="36" r="14"/>
    <rect class="line" x="66" y="22" width="150" height="9" rx="2"/>
    <rect class="line" x="66" y="40" width="190" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="296" cy="22" r="5"/>
  </g>

  <!-- ============ ROW 2 ============ -->

  <!-- 4. TAB : a rounded index tab protruding into the top padding -->
  <g transform="translate(40,300)">
    <text class="cap" x="0" y="-14">tab</text>
    <text class="sub" x="55" y="-14">index tab on top edge · top padding clears it</text>
    <rect class="card" width="320" height="72" rx="7"/>
    <path d="M20 0 h64 q6 0 6 6 v0 h-76 v0 q0 -6 6 -6 z" fill="#cda84e" opacity=".8"/>
    <circle class="av" cx="34" cy="44" r="14"/>
    <rect class="line" x="58" y="30" width="150" height="9" rx="2"/>
    <rect class="line" x="58" y="48" width="200" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="300" cy="14" r="5"/>
  </g>

  <!-- 5. GILT-EDGE : a thin gradient keyline hugging all four sides -->
  <g transform="translate(420,300)">
    <text class="cap" x="0" y="-14">gilt-edge</text>
    <text class="sub" x="105" y="-14">thin gilt keyline all sides · illuminated</text>
    <rect class="card" width="320" height="72" rx="9"/>
    <rect x="3" y="3" width="314" height="66" rx="7" class="g1" stroke-width="1.5"/>
    <circle class="av" cx="42" cy="36" r="14"/>
    <rect class="line" x="66" y="22" width="150" height="9" rx="2"/>
    <rect class="line" x="66" y="40" width="180" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="296" cy="22" r="5"/>
  </g>

  <!-- 6. FILET : header zone divided by a rule (title strip on top) -->
  <g transform="translate(800,300)">
    <text class="cap" x="0" y="-14">filet</text>
    <text class="sub" x="60" y="-14">header rule under title zone · reserved top pad</text>
    <rect class="card" width="320" height="72" rx="7"/>
    <line x1="10" y1="26" x2="310" y2="26" stroke="#cda84e" stroke-width="1" opacity=".5"/>
    <rect class="line" x="12" y="12" width="120" height="8" rx="2"/>
    <circle class="av" cx="30" cy="50" r="12"/>
    <rect class="line" x="52" y="44" width="200" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="300" cy="14" r="5"/>
  </g>

  <!-- ============ ROW 3 ============ -->

  <!-- 7. CLIPPED-TL : a single small bevel at the TOP-LEFT (mirror of chamfer) -->
  <g transform="translate(40,480)">
    <text class="cap" x="0" y="-14">wedge</text>
    <text class="sub" x="70" y="-14">one top-left bevel · futuristic · in padding</text>
    <path class="card" d="M13 0 H320 V72 H0 V13 Z"/>
    <circle class="av" cx="40" cy="38" r="14"/>
    <rect class="line" x="64" y="24" width="150" height="9" rx="2"/>
    <rect class="line" x="64" y="42" width="190" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="300" cy="20" r="5"/>
  </g>

  <!-- 8. CORNER-DOTS : four small registration dots inside the corners -->
  <g transform="translate(420,480)">
    <text class="cap" x="0" y="-14">studs</text>
    <text class="sub" x="65" y="-14">four corner registration dots · in padding</text>
    <rect class="card" width="320" height="72" rx="7"/>
    <circle class="accent" cx="9" cy="9" r="2.4" opacity=".7"/>
    <circle class="accent" cx="311" cy="9" r="2.4" opacity=".7"/>
    <circle class="accent" cx="9" cy="63" r="2.4" opacity=".7"/>
    <circle class="accent" cx="311" cy="63" r="2.4" opacity=".7"/>
    <circle class="av" cx="42" cy="36" r="14"/>
    <rect class="line" x="66" y="22" width="150" height="9" rx="2"/>
    <rect class="line" x="66" y="40" width="190" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="296" cy="22" r="5"/>
  </g>

  <!-- extra: SPINE-DOTS : a bound-ledger left edge (dots down the spine) -->
  <g transform="translate(800,480)">
    <text class="cap" x="0" y="-14">binding</text>
    <text class="sub" x="90" y="-14">ledger binding holes · left pad clears them</text>
    <rect class="card" width="320" height="72" rx="0 7 7 0" style="rx:0"/>
    <rect x="0" y="0" width="320" height="72" rx="7" class="card"/>
    <circle class="line" cx="11" cy="20" r="2.6"/>
    <circle class="line" cx="11" cy="36" r="2.6"/>
    <circle class="line" cx="11" cy="52" r="2.6"/>
    <circle class="av" cx="46" cy="36" r="14"/>
    <rect class="line" x="70" y="22" width="150" height="9" rx="2"/>
    <rect class="line" x="70" y="40" width="180" height="7" rx="2" opacity=".7"/>
    <circle class="ctl" cx="296" cy="22" r="5"/>
  </g>

  <text class="sub" x="40" y="620">Each treatment reserves padding on the affected side (SHAPE_GEOM) and draws its detail as a fixed pseudo-element</text>
  <text class="sub" x="40" y="642">(shapeDetail in styles.ts). Bevels (wedge) use a small fixed clip that lives entirely in the reserved corner padding.</text>

  <!-- ============ scale proof: worst-case thin item row (r 6.1) ============ -->
  <text class="cap" x="40" y="710">scale proof — the same eight on the worst-case thin item row (320×52, ratio 6.1):</text>

  <g transform="translate(40,740)" font-size="0">
    <!-- margin -->
    <g><rect class="card" width="320" height="52" rx="6"/><line x1="20" y1="5" x2="20" y2="47" stroke="#c96a6a" stroke-width="1.5" opacity=".55"/><rect class="line" x="34" y="22" width="150" height="8" rx="2"/></g>
  </g>
  <g transform="translate(420,740)">
    <rect class="card" width="320" height="52" rx="4"/><path class="g" d="M12 8 h-6 v36 h6 M308 8 h6 v36 h-6"/><rect class="line" x="30" y="22" width="150" height="8" rx="2"/>
  </g>
  <g transform="translate(800,740)">
    <rect class="card" width="320" height="52" rx="10"/><rect x="6" y="6" width="308" height="40" rx="7" class="g1" stroke-dasharray="4 3"/><rect class="line" x="30" y="22" width="150" height="8" rx="2"/>
  </g>
  <g transform="translate(40,820)">
    <rect class="card" width="320" height="52" rx="6"/><path d="M20 0 h64 q6 0 6 6 h-76 q0 -6 6 -6 z" fill="#cda84e" opacity=".8"/><rect class="line" x="20" y="26" width="150" height="8" rx="2"/>
  </g>
  <g transform="translate(420,820)">
    <rect class="card" width="320" height="52" rx="9"/><rect x="3" y="3" width="314" height="46" rx="7" class="g1" stroke-width="1.5"/><rect class="line" x="30" y="22" width="150" height="8" rx="2"/>
  </g>
  <g transform="translate(800,820)">
    <rect class="card" width="320" height="52" rx="6"/><line x1="10" y1="20" x2="310" y2="20" stroke="#cda84e" stroke-width="1" opacity=".5"/><rect class="line" x="12" y="8" width="90" height="7" rx="2"/><rect class="line" x="12" y="30" width="180" height="7" rx="2" opacity=".7"/>
  </g>
  <g transform="translate(40,900)">
    <path class="card" d="M13 0 H320 V52 H0 V13 Z"/><rect class="line" x="30" y="22" width="150" height="8" rx="2"/>
  </g>
  <g transform="translate(420,900)">
    <rect class="card" width="320" height="52" rx="6"/><circle class="accent" cx="9" cy="9" r="2.4" opacity=".7"/><circle class="accent" cx="311" cy="9" r="2.4" opacity=".7"/><circle class="accent" cx="9" cy="43" r="2.4" opacity=".7"/><circle class="accent" cx="311" cy="43" r="2.4" opacity=".7"/><rect class="line" x="30" y="22" width="150" height="8" rx="2"/>
  </g>
  <g transform="translate(800,900)">
    <rect class="card" width="320" height="52" rx="6"/><circle class="line" cx="11" cy="16" r="2.6"/><circle class="line" cx="11" cy="26" r="2.6"/><circle class="line" cx="11" cy="36" r="2.6"/><rect class="line" x="34" y="22" width="150" height="8" rx="2"/>
  </g>

  <text class="sub" x="40" y="990">Even at ratio 6.1 the decoration stays in the margins; the single text line clears every treatment.</text>
</svg>
