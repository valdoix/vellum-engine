<svg xmlns="http://www.w3.org/2000/svg" width="440" height="940" viewBox="0 0 440 940" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1014"/><stop offset="1" stop-color="#141821"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1b2029"/><stop offset="1" stop-color="#171c24"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#7aa0ff"/></linearGradient>
    <linearGradient id="affg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#6ee7b7"/></linearGradient>
    <linearGradient id="trug" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#93c5fd"/></linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- device frame -->
  <rect width="440" height="940" rx="0" fill="url(#bg)"/>

  <!-- glow accent top -->
  <ellipse cx="220" cy="40" rx="200" ry="90" fill="#5b8cff" opacity="0.12" filter="url(#soft)"/>

  <!-- status bar -->
  <text x="28" y="50" fill="#e8edf5" font-size="13" font-weight="600" letter-spacing="0.5">9:41</text>
  <g fill="#9aa6b8"><rect x="372" y="42" width="18" height="11" rx="2"/><circle cx="404" cy="47" r="5"/><rect x="350" y="44" width="14" height="9" rx="1"/></g>

  <!-- app header -->
  <text x="28" y="100" fill="#e8edf5" font-size="30" font-weight="700" letter-spacing="-0.5">Now</text>
  <circle cx="396" cy="90" r="18" fill="#1b2029"/><circle cx="396" cy="90" r="17" fill="none" stroke="#2a3340"/>
  <circle cx="396" cy="90" r="3" fill="#5b8cff"/><circle cx="396" cy="84" r="2" fill="#9aa6b8"/><circle cx="402" cy="93" r="2" fill="#9aa6b8"/><circle cx="390" cy="93" r="2" fill="#9aa6b8"/>
  <text x="28" y="124" fill="#6b7688" font-size="14" font-weight="500">Turn 147 · Day 12 · dusk · rain</text>

  <!-- HERO scene card -->
  <rect x="20" y="148" width="400" height="118" rx="22" fill="url(#card)"/>
  <rect x="20" y="148" width="400" height="118" rx="22" fill="none" stroke="#2a3340" stroke-width="1"/>
  <text x="40" y="186" fill="#6b7688" font-size="11" font-weight="700" letter-spacing="1.5">CURRENT SCENE</text>
  <text x="40" y="218" fill="#f3f6fb" font-size="23" font-weight="600">The drowned chapel</text>
  <text x="40" y="242" fill="#9aa6b8" font-size="15">Lower crypt · water on the altar</text>
  <!-- tension pill -->
  <rect x="300" y="174" width="100" height="30" rx="15" fill="#f59e0b" fill-opacity="0.14"/>
  <circle cx="318" cy="189" r="4" fill="#f59e0b"/>
  <text x="330" y="194" fill="#fbbf24" font-size="13" font-weight="600">Tension 7</text>

  <!-- "In the room" section -->
  <text x="28" y="306" fill="#e8edf5" font-size="17" font-weight="700">In the room</text>
  <text x="412" y="306" fill="#5b8cff" font-size="13" font-weight="600" text-anchor="end">2</text>

  <!-- person card 1 -->
  <rect x="20" y="320" width="400" height="106" rx="20" fill="url(#card)"/>
  <circle cx="58" cy="358" r="22" fill="#2a3340"/>
  <text x="58" y="364" fill="#a7e8c8" font-size="16" font-weight="600" text-anchor="middle">A</text>
  <circle cx="74" cy="343" r="6" fill="#34d399" stroke="#171c24" stroke-width="2.5"/>
  <text x="92" y="350" fill="#f3f6fb" font-size="18" font-weight="600">Sister Aveline</text>
  <rect x="92" y="362" width="54" height="22" rx="11" fill="#34d399" fill-opacity="0.14"/><text x="119" y="377" fill="#6ee7b7" font-size="11" font-weight="600" text-anchor="middle">wary</text>
  <rect x="152" y="362" width="74" height="22" rx="11" fill="#f87171" fill-opacity="0.14"/><text x="189" y="377" fill="#fca5a5" font-size="11" font-weight="600" text-anchor="middle">bleeding</text>
  <text x="40" y="410" fill="#9aa6b8" font-size="14" font-style="italic">“He swore the door was sealed. He lied.”</text>

  <!-- person card 2 -->
  <rect x="20" y="436" width="400" height="84" rx="20" fill="url(#card)"/>
  <circle cx="58" cy="470" r="22" fill="#2a3340"/>
  <text x="58" y="476" fill="#a7e8c8" font-size="16" font-weight="600" text-anchor="middle">C</text>
  <circle cx="74" cy="455" r="6" fill="#34d399" stroke="#171c24" stroke-width="2.5"/>
  <text x="92" y="462" fill="#f3f6fb" font-size="18" font-weight="600">Coren</text>
  <rect x="92" y="474" width="66" height="22" rx="11" fill="#34d399" fill-opacity="0.14"/><text x="125" y="489" fill="#6ee7b7" font-size="11" font-weight="600" text-anchor="middle">guarded</text>
  <text x="40" y="510" fill="#9aa6b8" font-size="14" font-style="italic">Between her and the dark, blade half-drawn.</text>

  <!-- Bond spotlight card -->
  <text x="28" y="560" fill="#e8edf5" font-size="17" font-weight="700">Bond spotlight</text>
  <rect x="20" y="574" width="400" height="150" rx="20" fill="url(#card)"/>
  <text x="40" y="606" fill="#f3f6fb" font-size="17" font-weight="600">Aveline &amp; Coren</text>
  <text x="40" y="628" fill="#a78bfa" font-size="13" font-weight="500">infatuation · uneven trust</text>
  <!-- affection track -->
  <text x="40" y="660" fill="#6b7688" font-size="11" font-weight="600">AFFECTION</text>
  <rect x="40" y="668" width="360" height="10" rx="5" fill="#222a35"/>
  <rect x="40" y="668" width="290" height="10" rx="5" fill="url(#affg)"/>
  <text x="392" y="662" fill="#6ee7b7" font-size="12" font-weight="700" text-anchor="end">+62 / +72</text>
  <!-- trust track -->
  <text x="40" y="700" fill="#6b7688" font-size="11" font-weight="600">TRUST</text>
  <rect x="40" y="708" width="360" height="10" rx="5" fill="#222a35"/>
  <rect x="40" y="708" width="95" height="10" rx="5" fill="url(#trug)"/>
  <text x="392" y="702" fill="#93c5fd" font-size="12" font-weight="700" text-anchor="end">−20 / +40</text>

  <!-- activity feed (timeline) -->
  <text x="28" y="762" fill="#e8edf5" font-size="17" font-weight="700">Just now</text>
  <g>
    <circle cx="34" cy="788" r="5" fill="#34d399"/>
    <rect x="52" y="778" width="368" height="20" rx="0" fill="none"/>
    <text x="52" y="785" fill="#6b7688" font-size="11" font-weight="600">JOURNAL · Aveline</text>
    <text x="52" y="801" fill="#cdd5e2" font-size="14">“I will not kneel to him again.”</text>
    <line x1="34" y1="794" x2="34" y2="820" stroke="#2a3340"/>
    <circle cx="34" cy="826" r="5" fill="#60a5fa"/>
    <text x="52" y="823" fill="#6b7688" font-size="11" font-weight="600">LEARNED · Coren</text>
    <text x="52" y="839" fill="#cdd5e2" font-size="14">A second exit exists.</text>
    <line x1="34" y1="832" x2="34" y2="858" stroke="#2a3340"/>
    <circle cx="34" cy="864" r="5" fill="#f87171"/>
    <text x="52" y="861" fill="#6b7688" font-size="11" font-weight="600">SECRET · Aveline</text>
    <text x="52" y="877" fill="#cdd5e2" font-size="14">She carries the Vicar’s seal.</text>
  </g>

  <!-- bottom tab dock -->
  <rect x="0" y="892" width="440" height="48" fill="#10141b"/>
  <line x1="0" y1="892" x2="440" y2="892" stroke="#222a35"/>
  <g text-anchor="middle">
    <g><circle cx="50" cy="912" r="3" fill="#5b8cff"/><rect x="38" y="908" width="24" height="2" fill="none"/><text x="50" y="932" fill="#7aa0ff" font-size="10" font-weight="600">Now</text></g>
    <text x="138" y="916" fill="#5b6675" font-size="16">◎</text><text x="138" y="932" fill="#5b6675" font-size="10">Cast</text>
    <text x="226" y="916" fill="#5b6675" font-size="16">⬡</text><text x="226" y="932" fill="#5b6675" font-size="10">Bonds</text>
    <text x="314" y="916" fill="#5b6675" font-size="16">≡</text><text x="314" y="932" fill="#5b6675" font-size="10">Story</text>
    <text x="396" y="916" fill="#5b6675" font-size="16">⌕</text><text x="396" y="932" fill="#5b6675" font-size="10">Find</text>
  </g>
</svg>
