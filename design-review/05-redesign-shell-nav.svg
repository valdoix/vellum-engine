<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="940" viewBox="0 0 1280 940" font-family="Georgia, serif">
  <defs>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#17140f"/><stop offset="1" stop-color="#0d0b08"/></linearGradient>
  </defs>
  <rect width="1280" height="940" fill="#26221b"/>
  <text x="40" y="46" fill="#cda84e" font-size="25" letter-spacing="2">REDESIGN — information architecture + shell</text>
  <text x="40" y="72" fill="#9a8f78" font-size="15" font-style="italic">16 flat destinations → 4 grouped sections + a context drawer. Green = rationale.</text>

  <rect x="40" y="100" width="600" height="800" rx="14" fill="url(#g5)" stroke="#cda84e" stroke-opacity="0.4"/>

  <!-- head -->
  <text x="64" y="138" fill="#cda84e" font-size="15">❖</text>
  <text x="86" y="140" fill="#e7d6ad" font-size="20" letter-spacing="2">VELLUM</text>
  <text x="610" y="140" fill="#9a8f78" font-family="monospace" font-size="9" text-anchor="end">T147 · D12 · 9 cast · 14 bonds</text>
  <line x1="40" y1="152" x2="640" y2="152" stroke="#cda84e" stroke-opacity="0.16"/>

  <!-- PRIMARY TABS: 4 only, with a soft "Story" group label and tools demoted -->
  <g font-family="monospace" font-size="12" letter-spacing="0.5">
    <rect x="64" y="168" width="62" height="30" rx="9" fill="#cda84e" fill-opacity="0.2" stroke="#cda84e" stroke-opacity="0.45"/><text x="76" y="188" fill="#cda84e">Now</text>
    <rect x="134" y="168" width="74" height="30" rx="9" fill="none"/><text x="146" y="188" fill="#9a8f78">Cast</text>
    <rect x="216" y="168" width="92" height="30" rx="9"/><text x="226" y="188" fill="#9a8f78">Bonds</text>
    <rect x="316" y="168" width="104" height="30" rx="9"/><text x="326" y="188" fill="#9a8f78">Chronicle</text>
    <!-- tools pushed right + iconified, visually secondary -->
    <text x="500" y="188" fill="#6f6655">⌕</text>
    <text x="528" y="188" fill="#6f6655">⚑</text>
    <text x="556" y="188" fill="#6f6655">◈</text>
    <text x="584" y="188" fill="#6f6655">⋯</text>
  </g>
  <line x1="40" y1="212" x2="640" y2="212" stroke="#cda84e" stroke-opacity="0.1"/>

  <!-- Chronicle reorganized: 2 clear groups instead of 8 flat siblings -->
  <text x="64" y="240" fill="#8a8071" font-family="monospace" font-size="10" letter-spacing="1.5">CHRONICLE — grouped, not 8 flat tabs</text>

  <text x="64" y="268" fill="#6f6655" font-family="monospace" font-size="9" letter-spacing="1">THE WORLD</text>
  <g font-family="Georgia" font-size="13">
    <rect x="64" y="276" width="120" height="30" rx="8" fill="#cda84e" fill-opacity="0.16" stroke="#cda84e" stroke-opacity="0.4"/><text x="78" y="296" fill="#e7d6ad">⊹ Scene &amp; arcs</text>
    <rect x="192" y="276" width="106" height="30" rx="8" fill="#1c1813"/><text x="206" y="296" fill="#9a8f78">⊷ Timeline</text>
    <rect x="306" y="276" width="92" height="30" rx="8" fill="#1c1813"/><text x="320" y="296" fill="#9a8f78">⚑ Beats</text>
  </g>
  <text x="64" y="334" fill="#6f6655" font-family="monospace" font-size="9" letter-spacing="1">WHAT'S KNOWN &amp; KEPT</text>
  <g font-family="Georgia" font-size="13">
    <rect x="64" y="342" width="106" height="30" rx="8" fill="#1c1813"/><text x="78" y="362" fill="#9a8f78">◈ Knowledge</text>
    <rect x="178" y="342" width="88" height="30" rx="8" fill="#1c1813"/><text x="192" y="362" fill="#9a8f78">⚀ Secrets</text>
    <rect x="274" y="342" width="80" height="30" rx="8" fill="#1c1813"/><text x="288" y="362" fill="#9a8f78">☠ Scars</text>
    <rect x="362" y="342" width="80" height="30" rx="8" fill="#1c1813"/><text x="376" y="362" fill="#9a8f78">❖ Codex</text>
    <rect x="450" y="342" width="92" height="30" rx="8" fill="#1c1813"/><text x="464" y="362" fill="#9a8f78">📖 Memory</text>
  </g>

  <!-- Differentiated list rows: each record TYPE reads differently -->
  <text x="64" y="404" fill="#8a8071" font-family="monospace" font-size="10" letter-spacing="1.5">RECORDS READ DIFFERENTLY BY TYPE</text>

  <!-- knowledge row: epistemic-led -->
  <rect x="64" y="416" width="552" height="44" rx="9" fill="#1c1813"/>
  <rect x="64" y="416" width="3" height="44" fill="#9bc0e6"/>
  <text x="80" y="434" fill="#9bc0e6" font-family="monospace" font-size="10">Coren believes</text>
  <text x="80" y="452" fill="#cdbfa0" font-size="13.5">the Vicar is dead — </text>
  <text x="218" y="452" fill="#e09090" font-family="monospace" font-size="11">✗ actually false</text>

  <!-- secret row: lock-led, who-from -->
  <rect x="64" y="468" width="552" height="44" rx="9" fill="#1c1813"/>
  <rect x="64" y="468" width="3" height="44" fill="#c96a6a"/>
  <text x="80" y="486" fill="#e09090" font-family="monospace" font-size="10">⚀ Aveline keeps from Coren</text>
  <text x="80" y="504" fill="#cdbfa0" font-size="13.5">she carries the Vicar's seal</text>

  <!-- scar row: struck-through belief -->
  <rect x="64" y="520" width="552" height="44" rx="9" fill="#1c1813"/>
  <rect x="64" y="520" width="3" height="44" fill="#b48ed0"/>
  <text x="80" y="538" fill="#c79ae0" font-family="monospace" font-size="10">☠ Aveline — healed-over belief</text>
  <text x="80" y="556" fill="#9a8f78" font-size="13.5" text-decoration="line-through">that Coren had betrayed her</text>

  <!-- codex row: canon, no owner -->
  <rect x="64" y="572" width="552" height="44" rx="9" fill="#1c1813"/>
  <rect x="64" y="572" width="3" height="44" fill="#cda84e"/>
  <text x="80" y="590" fill="#cda84e" font-family="monospace" font-size="10">❖ Canon · custom</text>
  <text x="80" y="608" fill="#cdbfa0" font-size="13.5">The Salt Guild brands initiates on the wrist.</text>

  <!-- CALLOUTS -->
  <g font-family="monospace" font-size="13" fill="#9fd08a">
    <line x1="420" y1="184" x2="700" y2="172" stroke="#9fd08a" stroke-width="1.5"/>
    <text x="708" y="168">A. 4 primary tabs you actually live in:</text>
    <text x="728" y="186" fill="#bcd9ad">Now / Cast / Bonds / Chronicle. Tools</text>
    <text x="728" y="204" fill="#bcd9ad">(search, director, customize, actions) demote</text>
    <text x="728" y="222" fill="#bcd9ad">to quiet icons — present, not competing.</text>

    <line x1="390" y1="290" x2="700" y2="280" stroke="#9fd08a" stroke-width="1.5"/>
    <text x="708" y="276">B. Chronicle’s 8 views regroup under 2 headers</text>
    <text x="728" y="294" fill="#bcd9ad">(“The World” vs “What’s Known &amp; Kept”).</text>
    <text x="728" y="312" fill="#bcd9ad">Same destinations, but now they MEAN something</text>
    <text x="728" y="330" fill="#bcd9ad">as a set — the second nav strip gets a purpose.</text>

    <line x1="430" y1="452" x2="700" y2="430" stroke="#9fd08a" stroke-width="1.5"/>
    <text x="708" y="426">C. Each record type gets its OWN row grammar:</text>
    <text x="728" y="444" fill="#bcd9ad">knowledge leads with the epistemic verb (believes</text>
    <text x="728" y="462" fill="#bcd9ad">/wrong), secrets with “keeps from”, scars with a</text>
    <text x="728" y="480" fill="#bcd9ad">struck-through belief, codex with “Canon” + no owner.</text>
    <text x="728" y="498" fill="#bcd9ad">You know the view by its shape, not by reading chips.</text>

    <line x1="300" y1="594" x2="700" y2="560" stroke="#9fd08a" stroke-width="1.2" stroke-dasharray="3 3"/>
    <text x="708" y="556">D. Colored spine per type carries identity at the</text>
    <text x="728" y="574" fill="#bcd9ad">edge of the row — scannable down a long list.</text>

    <text x="708" y="618" fill="#cda84e">E. Unify the two entry points: the floating window</text>
    <text x="728" y="636" fill="#bcd9ad">and the drawer host the SAME shell. Float defaults</text>
    <text x="728" y="654" fill="#bcd9ad">to Now but can open any tab — one mental model,</text>
    <text x="728" y="672" fill="#bcd9ad">not “the little window is different from the big one”.</text>

    <text x="708" y="716" fill="#cda84e">F. Split the Actions menu by VERB vs STATE:</text>
    <text x="728" y="734" fill="#bcd9ad">a “Maintain” list (one-shot: rescan/rebuild/tidy),</text>
    <text x="728" y="752" fill="#bcd9ad">a “Settings” area for toggles (traverse/tone/hide/</text>
    <text x="728" y="770" fill="#bcd9ad">off-screen) showing live state, and Clear quarantined.</text>
    <text x="728" y="788" fill="#bcd9ad">Promote Summarize/Undo to the toolbar — they’re daily.</text>
  </g>
</svg>
