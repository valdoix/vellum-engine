<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Georgia, serif">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1610" stop-opacity="0.985"/>
      <stop offset="1" stop-color="#0f0d0a" stop-opacity="0.985"/>
    </linearGradient>
    <radialGradient id="bloom" cx="50%" cy="0%" r="70%">
      <stop offset="0" stop-color="#cda84e" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#cda84e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1914" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#12100c" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="#26221b"/>
  <text x="40" y="48" fill="#cda84e" font-size="26" letter-spacing="2">CURRENT — “Now” dashboard (illuminated skin)</text>
  <text x="40" y="74" fill="#9a8f78" font-size="15" font-style="italic">Reconstructed from src/ui/styles.ts + dashboard.ts. Red = problems.</text>

  <!-- floating window frame -->
  <g>
    <rect x="40" y="100" width="560" height="760" rx="18" fill="url(#glass)" stroke="#cda84e" stroke-opacity="0.5"/>
    <rect x="46" y="106" width="548" height="748" rx="13" fill="none" stroke="#cda84e" stroke-opacity="0.2"/>
    <rect x="40" y="100" width="560" height="150" rx="18" fill="url(#bloom)"/>

    <!-- title bar -->
    <text x="68" y="150" fill="#cda84e" font-size="18">✦</text>
    <text x="92" y="152" fill="#e7d6ad" font-size="22" letter-spacing="6" font-family="Georgia">V E L L U M</text>
    <g font-family="monospace" font-size="11" letter-spacing="1" fill="#cdbfa0">
      <rect x="430" y="134" width="50" height="26" rx="8" fill="#cda84e" fill-opacity="0.1" stroke="#cda84e" stroke-opacity="0.26"/>
      <text x="442" y="151">CAST</text>
      <rect x="486" y="134" width="44" height="26" rx="8" fill="#cda84e" fill-opacity="0.1" stroke="#cda84e" stroke-opacity="0.26"/>
      <text x="496" y="151">REL</text>
      <rect x="536" y="134" width="24" height="26" rx="8" fill="none" stroke="#cda84e" stroke-opacity="0.26"/>
      <text x="543" y="151">⚙</text>
    </g>
    <line x1="40" y1="178" x2="600" y2="178" stroke="#cda84e" stroke-opacity="0.22"/>

    <!-- STATUS section -->
    <rect x="64" y="196" width="512" height="64" rx="13" fill="url(#sec)" stroke="#cda84e" stroke-opacity="0.14"/>
    <g font-family="monospace" font-size="11">
      <rect x="78" y="210" width="78" height="24" rx="8" fill="#cda84e" fill-opacity="0.1" stroke="#cda84e" stroke-opacity="0.24"/>
      <text x="88" y="226" fill="#cda84e">Turn</text><text x="120" y="226" fill="#cdbfa0">147</text>
      <rect x="164" y="210" width="74" height="24" rx="8" fill="#cda84e" fill-opacity="0.1" stroke="#cda84e" stroke-opacity="0.24"/>
      <text x="174" y="226" fill="#cda84e">Day</text><text x="202" y="226" fill="#cdbfa0">12</text>
      <rect x="246" y="210" width="96" height="24" rx="8" fill="#cda84e" fill-opacity="0.1" stroke="#cda84e" stroke-opacity="0.24"/>
      <text x="256" y="226" fill="#cda84e">Time</text><text x="288" y="226" fill="#cdbfa0">dusk</text>
      <rect x="350" y="210" width="96" height="24" rx="8" fill="#cda84e" fill-opacity="0.1" stroke="#cda84e" stroke-opacity="0.24"/>
      <text x="360" y="226" fill="#cda84e">☁</text><text x="378" y="226" fill="#cdbfa0">rain</text>
    </g>
    <text x="78" y="252" fill="#e7d6ad" font-size="18" font-style="italic">◈ The drowned chapel, lower crypt</text>

    <!-- TENSION -->
    <rect x="64" y="272" width="512" height="58" rx="13" fill="url(#sec)" stroke="#cda84e" stroke-opacity="0.14"/>
    <text x="78" y="294" fill="#cda84e" font-family="monospace" font-size="10" letter-spacing="1.5">TENSION</text>
    <rect x="78" y="306" width="430" height="8" rx="5" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="78" y="306" width="301" height="8" rx="5" fill="#c96a6a"/>
    <text x="520" y="313" fill="#cdbfa0" font-family="monospace" font-size="11">7/10</text>

    <!-- PRESENT -->
    <rect x="64" y="342" width="512" height="190" rx="13" fill="url(#sec)" stroke="#cda84e" stroke-opacity="0.14"/>
    <text x="78" y="364" fill="#cda84e" font-family="monospace" font-size="10" letter-spacing="1.5">PRESENT</text>
    <circle cx="492" cy="360" r="9" fill="#cda84e" fill-opacity="0.18"/><text x="488" y="364" fill="#cda84e" font-size="9">2</text>

    <g>
      <rect x="78" y="376" width="484" height="68" rx="0" fill="#cda84e" fill-opacity="0.05"/>
      <rect x="78" y="376" width="3" height="68" fill="#cda84e" fill-opacity="0.5"/>
      <text x="92" y="396" fill="#e7d6ad" font-size="17" font-weight="bold">Sister Aveline</text>
      <rect x="220" y="382" width="58" height="18" rx="6" fill="#8fa67e" fill-opacity="0.2"/><text x="228" y="395" fill="#a9c089" font-family="monospace" font-size="9">WARY</text>
      <rect x="284" y="382" width="74" height="18" rx="6" fill="#c96a6a" fill-opacity="0.18"/><text x="292" y="395" fill="#e09090" font-family="monospace" font-size="9">BLEEDING</text>
      <text x="92" y="416" fill="#cdbfa0" font-size="13">Pressing a torn sleeve to the wound, watching the stairs.</text>
      <text x="92" y="435" fill="#cdbfa0" font-size="14" font-style="italic">「He said the door was sealed. He lied.」</text>
    </g>
    <g>
      <rect x="78" y="452" width="484" height="68" rx="0" fill="#cda84e" fill-opacity="0.05"/>
      <rect x="78" y="452" width="3" height="68" fill="#cda84e" fill-opacity="0.5"/>
      <text x="92" y="472" fill="#e7d6ad" font-size="17" font-weight="bold">Coren</text>
      <rect x="160" y="458" width="64" height="18" rx="6" fill="#8fa67e" fill-opacity="0.2"/><text x="168" y="471" fill="#a9c089" font-family="monospace" font-size="9">GUARDED</text>
      <text x="92" y="492" fill="#cdbfa0" font-size="13">Standing between her and the dark, blade half-drawn.</text>
      <text x="92" y="511" fill="#cdbfa0" font-size="14" font-style="italic">「If she dies here it’s on me.」</text>
    </g>

    <!-- RELATIONS -->
    <rect x="64" y="544" width="512" height="120" rx="13" fill="url(#sec)" stroke="#cda84e" stroke-opacity="0.14"/>
    <text x="78" y="566" fill="#cda84e" font-family="monospace" font-size="10" letter-spacing="1.5">RELATIONS</text>
    <g font-size="13">
      <text x="78" y="592" fill="#e7d6ad">Aveline → Coren</text>
      <rect x="210" y="580" width="64" height="16" rx="5" fill="none" stroke="#c97a6a" stroke-opacity="0.45"/><text x="218" y="592" fill="#c97a6a" font-family="monospace" font-size="9">ALLIANCE</text>
      <text x="500" y="592" fill="#cdbfa0" font-family="monospace" font-size="9">thawing</text>
      <line x1="78" y1="604" x2="562" y2="604" stroke="#cda84e" stroke-opacity="0.08"/>
      <text x="78" y="626" fill="#e7d6ad">Coren → Aveline</text>
      <rect x="200" y="614" width="70" height="16" rx="5" fill="none" stroke="#b48ed0" stroke-opacity="0.45"/><text x="208" y="626" fill="#b48ed0" font-family="monospace" font-size="9">ROMANTIC</text>
      <text x="496" y="626" fill="#cdbfa0" font-family="monospace" font-size="9">devoted</text>
      <line x1="78" y1="638" x2="562" y2="638" stroke="#cda84e" stroke-opacity="0.08"/>
      <text x="78" y="658" fill="#e7d6ad">Aveline → The Vicar</text>
      <rect x="220" y="646" width="60" height="16" rx="5" fill="none" stroke="#c96a6a" stroke-opacity="0.45"/><text x="228" y="658" fill="#c96a6a" font-family="monospace" font-size="9">RIVALRY</text>
      <text x="510" y="658" fill="#cdbfa0" font-family="monospace" font-size="9">hostile</text>
    </g>

    <!-- LATEST -->
    <rect x="64" y="676" width="512" height="160" rx="13" fill="url(#sec)" stroke="#cda84e" stroke-opacity="0.14"/>
    <text x="78" y="698" fill="#cda84e" font-family="monospace" font-size="10" letter-spacing="1.5">LATEST</text>
    <g font-size="12.5">
      <rect x="78" y="708" width="56" height="18" rx="5" fill="#cda84e" fill-opacity="0.14"/><text x="84" y="721" fill="#cda84e" font-family="monospace" font-size="9">journal</text>
      <text x="142" y="721" fill="#cdbfa0">Aveline: “I will not kneel to him again.”</text>
      <rect x="78" y="734" width="46" height="18" rx="5" fill="#cda84e" fill-opacity="0.14"/><text x="84" y="747" fill="#cda84e" font-family="monospace" font-size="9">knew</text>
      <text x="132" y="747" fill="#cdbfa0">Coren: the chapel has a second exit</text>
      <rect x="78" y="760" width="52" height="18" rx="5" fill="#cda84e" fill-opacity="0.14"/><text x="84" y="773" fill="#cda84e" font-family="monospace" font-size="9">secret</text>
      <text x="138" y="773" fill="#cdbfa0">Aveline: she carries the Vicar’s seal</text>
      <rect x="78" y="786" width="44" height="18" rx="5" fill="#cda84e" fill-opacity="0.14"/><text x="84" y="799" fill="#cda84e" font-family="monospace" font-size="9">shift</text>
      <text x="130" y="799" fill="#cdbfa0">Coren → Aveline: +protective</text>
    </g>
  </g>

  <!-- ANNOTATIONS -->
  <g font-family="monospace" font-size="13" fill="#ff8a8a">
    <line x1="448" y1="226" x2="660" y2="200" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="668" y="196">① Status chips: 4 identical gold pills —</text>
    <text x="688" y="214" fill="#d8a0a0">no hierarchy. Turn/Day/Time/Weather all</text>
    <text x="688" y="232" fill="#d8a0a0">weigh the same. The eye has no entry point.</text>

    <line x1="510" y1="310" x2="670" y2="300" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="678" y="296">② Tension = red bar only. Red also = danger,</text>
    <text x="698" y="314" fill="#d8a0a0">errors, “bleeding”, delete. Color is overloaded.</text>

    <line x1="358" y1="392" x2="668" y2="382" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="676" y="378">③ Mood/condition chips are UPPERCASE MONO —</text>
    <text x="696" y="396" fill="#d8a0a0">shouty, and clash with the serif character name.</text>
    <text x="696" y="414" fill="#d8a0a0">Two type voices fighting inside one card.</text>

    <line x1="300" y1="312" x2="660" y2="452" stroke="#ff8a8a" stroke-width="1.2" stroke-dasharray="3 3"/>
    <text x="668" y="450">④ Everything is ~9–11px mono. Long sessions =</text>
    <text x="688" y="468" fill="#d8a0a0">eye strain. Labels at 8px (LATEST keys) fail</text>
    <text x="688" y="486" fill="#d8a0a0">WCAG legibility for sustained reading.</text>

    <line x1="274" y1="588" x2="660" y2="560" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="668" y="556">⑤ Relations: “→” + sentiment word, but NO</text>
    <text x="688" y="574" fill="#d8a0a0">affection/trust numbers shown here. The</text>
    <text x="688" y="592" fill="#d8a0a0">engine’s best idea (2-axis bonds) is invisible.</text>

    <line x1="134" y1="717" x2="660" y2="650" stroke="#ff8a8a" stroke-width="1.5"/>
    <text x="668" y="646">⑥ “Latest” mixes 4 unrelated event types in</text>
    <text x="688" y="664" fill="#d8a0a0">one flat list. journal/knew/secret/shift have</text>
    <text x="688" y="682" fill="#d8a0a0">no visual grouping — reads as undifferentiated.</text>

    <text x="668" y="740" fill="#cda84e">⑦ Overall: ONE accent (gold) does borders,</text>
    <text x="688" y="758" fill="#d8a0a0">text, fills, glows, chips, dividers. Gold</text>
    <text x="688" y="776" fill="#d8a0a0">fatigue — nothing stands out because all of</text>
    <text x="688" y="794" fill="#d8a0a0">it is trying to. Density is uniform, so the</text>
    <text x="688" y="812" fill="#d8a0a0">scene (the point) doesn’t dominate the chrome.</text>
  </g>
</svg>
