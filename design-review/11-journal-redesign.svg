<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1040" viewBox="0 0 1280 1040" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bgj" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181410"/><stop offset="1" stop-color="#0c0a07"/></linearGradient>
    <linearGradient id="bookspine" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3a2f1a"/><stop offset="1" stop-color="#241c10"/></linearGradient>
    <radialGradient id="avj" cx="40%" cy="35%" r="75%"><stop offset="0" stop-color="#3a2f1a"/><stop offset="1" stop-color="#1d180f"/></radialGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#efe2c0"/><stop offset="1" stop-color="#e3d2a6"/></linearGradient>
  </defs>
  <rect width="1280" height="1040" fill="url(#bgj)"/>
  <text x="40" y="48" fill="#cda84e" font-size="25" letter-spacing="2">JOURNAL TAB — redesign</text>
  <text x="40" y="72" fill="#9a8f78" font-size="14" font-style="italic">Per-character memory journals (kind · weight · sentiment). Today: a flat "shelf" of buttons + a card grid. Redesign: real books → an open diary.</text>

  <!-- ===== TODAY ===== -->
  <text x="40" y="112" fill="#ff8a8a" font-family="monospace" font-size="12" letter-spacing="1">TODAY — text-button shelf + uniform card grid</text>
  <g font-family="monospace" font-size="10">
    <rect x="40" y="124" width="90" height="24" rx="7" fill="none" stroke="#cda84e" stroke-opacity="0.3"/><text x="50" y="140" fill="#cdbfa0">Aveline 7</text>
    <rect x="138" y="124" width="80" height="24" rx="7" fill="none" stroke="#cda84e" stroke-opacity="0.3"/><text x="148" y="140" fill="#cdbfa0">Coren 4</text>
    <rect x="226" y="124" width="80" height="24" rx="7" fill="none" stroke="#cda84e" stroke-opacity="0.3"/><text x="236" y="140" fill="#cdbfa0">Vicar 2</text>
  </g>
  <g>
    <rect x="40" y="158" width="180" height="92" rx="10" fill="#221d15" stroke="#8fa67e" stroke-opacity="0.3"/>
    <text x="54" y="178" fill="#a9c089" font-size="11">⚮ Aveline → Coren</text>
    <text x="54" y="200" fill="#cdbfa0" font-size="11">He pulled me from the</text>
    <text x="54" y="214" fill="#cdbfa0" font-size="11">water without a word.</text>
    <g font-family="monospace" font-size="8"><rect x="54" y="226" width="40" height="14" rx="4" fill="#cda84e" fill-opacity="0.12"/><text x="60" y="236" fill="#cda84e">shared</text></g>
  </g>
  <text x="240" y="200" fill="#d8a0a0" font-size="11" font-family="monospace">· books are just text pills</text>
  <text x="240" y="218" fill="#d8a0a0" font-size="11" font-family="monospace">· every entry = identical card</text>
  <text x="240" y="236" fill="#d8a0a0" font-size="11" font-family="monospace">· no sense of "whose memory"</text>

  <line x1="40" y1="278" x2="1240" y2="278" stroke="#cda84e" stroke-opacity="0.15"/>

  <!-- ===== REDESIGN A: the shelf as real spines ===== -->
  <text x="40" y="312" fill="#9fd08a" font-family="monospace" font-size="13" letter-spacing="1">REDESIGN A — "The Shelf": each character's journal is a book spine (portrait + count + dominant sentiment)</text>

  <g>
    <!-- book spines standing on a shelf -->
    <g><rect x="60" y="340" width="56" height="200" rx="4" fill="url(#bookspine)" stroke="#cda84e" stroke-opacity="0.4"/>
      <circle cx="88" cy="372" r="16" fill="url(#avj)" stroke="#8fa67e" stroke-width="1.5"/><text x="88" y="377" fill="#cda84e" font-size="11" text-anchor="middle">A</text>
      <text x="88" y="500" fill="#e7d6ad" font-size="13" text-anchor="middle" transform="rotate(-90 88 470)" font-style="italic">Aveline</text>
      <rect x="60" y="528" width="56" height="6" fill="#8fa67e"/><text x="88" y="556" fill="#9a8f78" font-size="9" text-anchor="middle" font-family="monospace">7</text></g>
    <g><rect x="124" y="356" width="52" height="184" rx="4" fill="url(#bookspine)" stroke="#cda84e" stroke-opacity="0.3"/>
      <circle cx="150" cy="384" r="14" fill="url(#avj)" stroke="#9bc0e6" stroke-width="1.5"/><text x="150" y="389" fill="#cda84e" font-size="10" text-anchor="middle">C</text>
      <text x="150" y="500" fill="#e7d6ad" font-size="12" text-anchor="middle" transform="rotate(-90 150 472)" font-style="italic">Coren</text>
      <rect x="124" y="528" width="52" height="6" fill="#9bc0e6"/><text x="150" y="556" fill="#9a8f78" font-size="9" text-anchor="middle" font-family="monospace">4</text></g>
    <g><rect x="184" y="372" width="48" height="168" rx="4" fill="url(#bookspine)" stroke="#cda84e" stroke-opacity="0.25"/>
      <circle cx="208" cy="398" r="13" fill="url(#avj)" stroke="#c96a6a" stroke-width="1.5"/><text x="208" y="403" fill="#cda84e" font-size="9" text-anchor="middle">V</text>
      <text x="208" y="500" fill="#cdbfa0" font-size="11" text-anchor="middle" transform="rotate(-90 208 476)" font-style="italic">Vicar</text>
      <rect x="184" y="528" width="48" height="6" fill="#c96a6a"/><text x="208" y="556" fill="#9a8f78" font-size="9" text-anchor="middle" font-family="monospace">2</text></g>
    <!-- shelf plank -->
    <rect x="48" y="540" width="200" height="8" rx="2" fill="#2a2114"/>
  </g>
  <text x="270" y="372" fill="#9fd08a" font-size="12" font-family="monospace">· book height = entry count (a fat journal</text>
  <text x="290" y="390" fill="#bcd9ad" font-size="12" font-family="monospace">means a well-remembered character)</text>
  <text x="270" y="414" fill="#9fd08a" font-size="12" font-family="monospace">· bottom band color = dominant sentiment</text>
  <text x="290" y="432" fill="#bcd9ad" font-size="12" font-family="monospace">(sage=fond, red=bitter, blue=neutral)</text>
  <text x="270" y="456" fill="#9fd08a" font-size="12" font-family="monospace">· portrait on the spine = instant recognition</text>
  <text x="270" y="480" fill="#9fd08a" font-size="12" font-family="monospace">· click a spine → it "opens" to the diary →</text>

  <line x1="40" y1="588" x2="1240" y2="588" stroke="#cda84e" stroke-opacity="0.15"/>

  <!-- ===== REDESIGN B: the open diary (book view) ===== -->
  <text x="40" y="622" fill="#9fd08a" font-family="monospace" font-size="13" letter-spacing="1">REDESIGN B — "The Open Diary": one character's journal as handwritten pages, entries as dated leaves</text>

  <!-- open book: two facing cream pages -->
  <g>
    <rect x="60" y="644" width="620" height="360" rx="6" fill="url(#page)"/>
    <rect x="370" y="644" width="14" height="360" fill="#000" fill-opacity="0.12"/>
    <line x1="377" y1="650" x2="377" y2="998" stroke="#9a6f1e" stroke-opacity="0.3"/>
    <!-- header -->
    <circle cx="100" cy="684" r="22" fill="#7d2b27"/><text x="100" y="692" fill="#f0c4c0" font-size="16" text-anchor="middle" font-style="italic">A</text>
    <text x="134" y="680" fill="#2a1d0c" font-size="20" font-style="italic">Aveline's Journal</text>
    <text x="134" y="700" fill="#7d2b27" font-size="11" font-style="italic">the moments she carries · 7 entries</text>
    <!-- filter ribbon -->
    <g font-family="monospace" font-size="9"><text x="430" y="676" fill="#9a6f1e">all</text><text x="464" y="676" fill="#5a4524">promise</text><text x="520" y="676" fill="#5a4524">wound</text><text x="572" y="676" fill="#5a4524">shared</text></g>
    <line x1="80" y1="714" x2="660" y2="714" stroke="#9a6f1e" stroke-opacity="0.25"/>

    <!-- LEFT PAGE entries (dated leaves, ruled) -->
    <g font-style="italic">
      <text x="80" y="742" fill="#9a6f1e" font-size="10" font-family="monospace">Day 11 · ✋ promise · significant</text>
      <text x="80" y="764" fill="#2a1d0c" font-size="14">"I swore I would not kneel to him</text>
      <text x="80" y="784" fill="#2a1d0c" font-size="14">again. I meant it this time."</text>
      <line x1="80" y1="800" x2="350" y2="800" stroke="#9a6f1e" stroke-opacity="0.15"/>
      <text x="80" y="826" fill="#9a6f1e" font-size="10" font-family="monospace">Day 9 · ☠ wound · defining</text>
      <text x="80" y="848" fill="#7d2b27" font-size="14">"He let the water take them. I</text>
      <text x="80" y="868" fill="#7d2b27" font-size="14">will not forget the sound."</text>
      <line x1="80" y1="884" x2="350" y2="884" stroke="#9a6f1e" stroke-opacity="0.15"/>
      <text x="80" y="910" fill="#9a6f1e" font-size="10" font-family="monospace">Day 9 · ⚮ shared → Coren · positive</text>
      <text x="80" y="932" fill="#3a5a2a" font-size="14">"He pulled me from the flood</text>
      <text x="80" y="952" fill="#3a5a2a" font-size="14">without a word, then turned away."</text>
    </g>

    <!-- RIGHT PAGE entries -->
    <g font-style="italic">
      <text x="400" y="742" fill="#9a6f1e" font-size="10" font-family="monospace">Day 12 · ↔ interaction · minor</text>
      <text x="400" y="764" fill="#2a1d0c" font-size="14">"The crypt smells of brine and</text>
      <text x="400" y="784" fill="#2a1d0c" font-size="14">old incense. He waited for me."</text>
      <line x1="400" y1="800" x2="660" y2="800" stroke="#9a6f1e" stroke-opacity="0.15"/>
      <text x="400" y="826" fill="#9a6f1e" font-size="10" font-family="monospace">Day 10 · ✨ gift · minor</text>
      <text x="400" y="848" fill="#2a1d0c" font-size="14">"He left bread on the altar stone.</text>
      <text x="400" y="868" fill="#2a1d0c" font-size="14">For me, I think."</text>
      <line x1="400" y1="884" x2="660" y2="884" stroke="#9a6f1e" stroke-opacity="0.15"/>
      <text x="400" y="918" fill="#5a4524" font-size="12">+ add a memory…</text>
    </g>
    <!-- page corner curl -->
    <path d="M660 984 q20 0 20 -20 l0 20 z" fill="#000" fill-opacity="0.1"/>
  </g>

  <text x="710" y="676" fill="#9fd08a" font-size="12" font-family="monospace">· entries become dated diary leaves,</text>
  <text x="730" y="694" fill="#bcd9ad" font-size="12" font-family="monospace">handwritten-italic, ruled lines</text>
  <text x="710" y="718" fill="#9fd08a" font-size="12" font-family="monospace">· sentiment colors the ink itself</text>
  <text x="730" y="736" fill="#bcd9ad" font-size="12" font-family="monospace">(red for wounds, green for fondness)</text>
  <text x="710" y="760" fill="#9fd08a" font-size="12" font-family="monospace">· kind glyph + weight in the meta line</text>
  <text x="710" y="784" fill="#9fd08a" font-size="12" font-family="monospace">· "about → X" links keep relationships</text>
  <text x="710" y="808" fill="#9fd08a" font-size="12" font-family="monospace">· chronological by day, newest page-right</text>

  <!-- themed note -->
  <text x="710" y="850" fill="#cda84e" font-size="12" font-family="monospace">THEMES:</text>
  <text x="710" y="870" fill="#bcd9ad" font-size="11.5" font-family="monospace">· Default/Fantasy → this cream diary</text>
  <text x="710" y="888" fill="#bcd9ad" font-size="11.5" font-family="monospace">· Modern → clean white cards, no skeuomorph</text>
  <text x="710" y="906" fill="#bcd9ad" font-size="11.5" font-family="monospace">· Futuristic → "MEMORY LOG", mono, timestamped</text>

  <!-- futuristic mini -->
  <g font-family="monospace">
    <rect x="710" y="924" width="500" height="74" rx="0" fill="#04121a" stroke="#28e0d8" stroke-opacity="0.4"/>
    <line x1="710" y1="924" x2="710" y2="998" stroke="#28e0d8" stroke-width="2"/>
    <text x="726" y="946" fill="#28e0d8" font-size="11" letter-spacing="1">◤ AVELINE_S // MEMORY_LOG [7]</text>
    <text x="726" y="966" fill="#5fb87e" font-size="9">[D11] PROMISE :: "will not kneel again"</text>
    <text x="726" y="982" fill="#ff5a8c" font-size="9">[D09] WOUND :: "the water took them" ▪ defining</text>
  </g>

  <text x="40" y="1028" fill="#cda84e" font-size="12" font-style="italic" opacity="0.75">Concept art. Shelf→spines (height=count, band=sentiment); book view→open diary with handwritten dated leaves. Reuses who/about/kind/weight/sentiment/day. No schema change.</text>
</svg>
