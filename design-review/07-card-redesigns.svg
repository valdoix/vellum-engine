<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a1610"/><stop offset="1" stop-color="#0e0c09"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#221d15"/><stop offset="1" stop-color="#16130d"/></linearGradient>
    <radialGradient id="av" cx="40%" cy="35%" r="75%"><stop offset="0" stop-color="#3a2f1a"/><stop offset="1" stop-color="#1d180f"/></radialGradient>
    <linearGradient id="aff" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8fa67e" stop-opacity="0.4"/><stop offset="1" stop-color="#a9c089"/></linearGradient>
    <linearGradient id="tru" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9bc0e6" stop-opacity="0.4"/><stop offset="1" stop-color="#9bc0e6"/></linearGradient>
  </defs>
  <rect width="1280" height="980" fill="url(#bg)"/>
  <text x="40" y="50" fill="#cda84e" font-size="25" letter-spacing="2">CARD REDESIGNS · I — Cast cards, six directions</text>
  <text x="40" y="74" fill="#9a8f78" font-size="14" font-style="italic">Same character (Sister Aveline) across six concepts. Pick a lane; they compose with the theme system.</text>

  <!-- ===== A. CURRENT (baseline) ===== -->
  <text x="40" y="118" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">A · CURRENT</text>
  <g>
    <rect x="40" y="130" width="370" height="84" rx="13" fill="url(#card)" stroke="#cda84e" stroke-opacity="0.16"/>
    <rect x="40" y="130" width="4" height="84" rx="2" fill="#8fa67e"/>
    <circle cx="78" cy="172" r="20" fill="url(#av)" stroke="#cda84e" stroke-opacity="0.4"/>
    <text x="78" y="178" fill="#cda84e" font-size="15" text-anchor="middle">SA</text>
    <circle cx="93" cy="157" r="5" fill="#8fa67e" stroke="#16130d" stroke-width="2"/>
    <text x="112" y="164" fill="#f2e4bd" font-size="17">Sister Aveline</text>
    <text x="112" y="184" fill="#a9c089" font-size="12.5" font-style="italic">present · Cleric, 34</text>
    <text x="112" y="202" fill="#b3a888" font-size="12">Auburn hair, a burn scar along the jaw</text>
    <g fill="#9a8f78" font-size="11" font-family="monospace"><text x="356" y="150">⤴</text><text x="376" y="150">✎</text><text x="396" y="150" fill="#c96a6a">✕</text></g>
  </g>

  <!-- ===== B. TAROT / ARCANA CARD ===== -->
  <text x="450" y="118" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">B · ARCANA — a drawn tarot card</text>
  <g>
    <rect x="450" y="130" width="170" height="250" rx="12" fill="#1c1206" stroke="#cda84e" stroke-width="1.5"/>
    <rect x="458" y="138" width="154" height="234" rx="8" fill="none" stroke="#cda84e" stroke-opacity="0.35"/>
    <text x="535" y="162" fill="#cda84e" font-size="11" text-anchor="middle" letter-spacing="3">XIII</text>
    <!-- portrait niche -->
    <rect x="478" y="174" width="114" height="120" rx="60" fill="url(#av)" stroke="#cda84e" stroke-opacity="0.5"/>
    <text x="535" y="244" fill="#cda84e" font-size="34" text-anchor="middle" font-style="italic">A</text>
    <!-- radiant lines -->
    <g stroke="#cda84e" stroke-opacity="0.25"><line x1="535" y1="150" x2="535" y2="170"/><line x1="490" y1="160" x2="500" y2="176"/><line x1="580" y1="160" x2="570" y2="176"/></g>
    <text x="535" y="322" fill="#f2e4bd" font-size="15" text-anchor="middle" font-style="italic">The Cleric</text>
    <text x="535" y="342" fill="#a9c089" font-size="10" text-anchor="middle" font-family="monospace" letter-spacing="1">PRESENT · WARY</text>
    <text x="535" y="362" fill="#9a8f78" font-size="9" text-anchor="middle">"the door was sealed. he lied."</text>
  </g>
  <text x="640" y="150" fill="#9fd08a" font-size="11" font-family="monospace">collectible-card feel;</text>
  <text x="640" y="166" fill="#bcd9ad" font-size="11" font-family="monospace">numeral = turn introduced,</text>
  <text x="640" y="182" fill="#bcd9ad" font-size="11" font-family="monospace">suit/arcana = role archetype.</text>
  <text x="640" y="198" fill="#bcd9ad" font-size="11" font-family="monospace">Great for a grid gallery view.</text>

  <!-- ===== C. DOSSIER / CASE FILE ===== -->
  <text x="850" y="118" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">C · DOSSIER — a clipped case file</text>
  <g>
    <rect x="850" y="134" width="390" height="120" rx="4" fill="#201d16" stroke="#9a8f78" stroke-opacity="0.3"/>
    <!-- paperclip -->
    <path d="M880 128 q0 -14 12 -14 q12 0 12 14 l0 30 q0 8 -8 8 q-8 0 -8 -8 l0 -22" fill="none" stroke="#b8b2a4" stroke-width="2.5"/>
    <!-- mugshot -->
    <rect x="868" y="150" width="74" height="88" fill="url(#av)" stroke="#9a8f78" stroke-opacity="0.4"/>
    <text x="905" y="200" fill="#cda84e" font-size="24" text-anchor="middle" font-style="italic">A</text>
    <line x1="868" y1="216" x2="942" y2="216" stroke="#9a8f78" stroke-opacity="0.3" stroke-dasharray="2 2"/>
    <text x="905" y="230" fill="#8a8071" font-size="7" text-anchor="middle" font-family="monospace">CASE #SA-34</text>
    <text x="958" y="162" fill="#f2e4bd" font-size="16" font-family="monospace">AVELINE, Sister</text>
    <g font-family="monospace" font-size="10.5" fill="#b3a888"><text x="958" y="184">ROLE ...... Cleric</text><text x="958" y="202">AGE ....... 34</text><text x="958" y="220">STATUS .... PRESENT</text></g>
    <!-- red stamp -->
    <g transform="rotate(-12 1180 200)"><rect x="1140" y="184" width="80" height="28" rx="3" fill="none" stroke="#c96a6a" stroke-width="2" opacity="0.7"/><text x="1180" y="203" fill="#e09090" font-size="13" text-anchor="middle" font-family="monospace" letter-spacing="1">WANTED</text></g>
  </g>
  <text x="850" y="278" fill="#9fd08a" font-size="11" font-family="monospace">noir/thriller stories; the stamp = a status badge (WANTED/ALLY/DECEASED).</text>

  <!-- ===== D. LIVING PORTRAIT (vital signs) ===== -->
  <text x="40" y="320" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">D · VITALS — a living portrait with bond pulse</text>
  <g>
    <rect x="40" y="334" width="390" height="120" rx="16" fill="url(#card)" stroke="#cda84e" stroke-opacity="0.18"/>
    <circle cx="98" cy="394" r="34" fill="url(#av)" stroke="#8fa67e" stroke-width="2"/>
    <text x="98" y="402" fill="#cda84e" font-size="22" text-anchor="middle" font-style="italic">A</text>
    <!-- breathing ring -->
    <circle cx="98" cy="394" r="40" fill="none" stroke="#8fa67e" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="3 5"/>
    <text x="150" y="364" fill="#f2e4bd" font-size="17">Sister Aveline</text>
    <text x="150" y="384" fill="#a9c089" font-size="12" font-style="italic">wary · bleeding</text>
    <!-- ECG-style mood line -->
    <text x="150" y="408" fill="#6f6655" font-size="8" font-family="monospace">MOOD</text>
    <polyline points="186,404 200,404 206,394 212,416 218,398 232,404 260,404 266,396 272,412 278,400 300,404 400,404" fill="none" stroke="#c96a6a" stroke-width="1.5"/>
    <!-- condition meter -->
    <text x="150" y="430" fill="#6f6655" font-size="8" font-family="monospace">CONDITION</text>
    <rect x="210" y="424" width="190" height="6" rx="3" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="210" y="424" width="92" height="6" rx="3" fill="#c96a6a"/>
  </g>
  <text x="40" y="478" fill="#9fd08a" font-size="11" font-family="monospace">mood as an animated ECG (motion-gated), condition as a vitals bar. Reads "alive".</text>

  <!-- ===== E. SIGNET / WAX MEDALLION (fantasy) ===== -->
  <text x="450" y="320" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">E · SIGNET — heraldic wax medallion</text>
  <g>
    <rect x="450" y="334" width="370" height="120" rx="10" fill="#e6d6ac" />
    <rect x="450" y="334" width="370" height="120" rx="10" fill="none" stroke="#9a6f1e" stroke-opacity="0.5"/>
    <!-- wax seal avatar -->
    <circle cx="510" cy="394" r="36" fill="#7d2b27"/>
    <circle cx="510" cy="394" r="30" fill="none" stroke="#e0a39e" stroke-opacity="0.4"/>
    <text x="510" y="404" fill="#f0c4c0" font-size="26" text-anchor="middle" font-style="italic">A</text>
    <text x="566" y="370" fill="#2a1d0c" font-size="18" font-style="italic">Sister Aveline</text>
    <text x="566" y="392" fill="#7d2b27" font-size="12" font-style="italic">Cleric of the Drowned Chapel · four-and-thirty</text>
    <text x="566" y="416" fill="#5a4524" font-size="11.5" font-style="italic">wary, &amp; bleeding from the stair</text>
    <text x="566" y="438" fill="#9a6f1e" font-family="monospace" font-size="9" letter-spacing="1">⚜ PRESENT</text>
  </g>
  <text x="450" y="478" fill="#9fd08a" font-size="11" font-family="monospace">the Fantasy/parchment card: a pressed-wax portrait on vellum. No spine — the seal IS the status.</text>

  <!-- ===== F. HUD CONTACT (futuristic) ===== -->
  <text x="850" y="320" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">F · CONTACT — HUD telemetry tag</text>
  <g font-family="monospace">
    <rect x="850" y="334" width="390" height="120" rx="0" fill="#04121a" stroke="#28e0d8" stroke-opacity="0.4"/>
    <line x1="850" y1="334" x2="850" y2="454" stroke="#28e0d8" stroke-width="2"/>
    <path d="M850 334 h16 M850 334 v16 M1240 454 h-16 M1240 454 v-16" stroke="#28e0d8" stroke-width="1.5" fill="none"/>
    <!-- reticle -->
    <circle cx="908" cy="394" r="26" fill="none" stroke="#28e0d8" stroke-width="1.5"/>
    <path d="M908 362 v8 M908 426 v-8 M876 394 h8 M940 394 h-8" stroke="#28e0d8" stroke-width="1.5"/>
    <text x="908" y="400" fill="#28e0d8" font-size="16" text-anchor="middle">A</text>
    <text x="952" y="360" fill="#e6feff" font-size="15" letter-spacing="1">AVELINE_S ▸</text>
    <text x="952" y="380" fill="#5fb8c8" font-size="10">ROLE :: cleric  AGE :: 34</text>
    <text x="952" y="398" fill="#ffb05c" font-size="10">STATUS :: WARY ▪ INTEGRITY 51%</text>
    <rect x="952" y="406" width="240" height="6" fill="none" stroke="#0a4a58"/><rect x="953" y="407" width="122" height="4" fill="#ff5a3c"/>
    <text x="952" y="434" fill="#7fd8e6" font-size="9">» "the door was sealed. he lied."</text>
    <circle cx="1224" cy="350" r="3" fill="#28e0d8"/>
  </g>
  <text x="850" y="478" fill="#9fd08a" font-size="11" font-family="monospace">the Futuristic card: contact telemetry, integrity bar = condition, reticle = avatar.</text>

  <!-- bottom: faction & bond mini concepts -->
  <line x1="40" y1="510" x2="1240" y2="510" stroke="#cda84e" stroke-opacity="0.15"/>
  <text x="40" y="544" fill="#cda84e" font-size="18" letter-spacing="1">Faction &amp; Bond cards</text>

  <!-- Faction: banner/sigil -->
  <text x="40" y="576" fill="#6f6655" font-family="monospace" font-size="12">FACTION · hanging banner</text>
  <g>
    <path d="M60 588 h120 v150 l-60 -24 l-60 24 z" fill="#3b4a63" stroke="#cda84e" stroke-opacity="0.4"/>
    <circle cx="120" cy="636" r="26" fill="#1d2533" stroke="#cda84e" stroke-opacity="0.5"/>
    <text x="120" y="644" fill="#cda84e" font-size="20" text-anchor="middle">⚔</text>
    <text x="120" y="688" fill="#d8e3f0" font-size="13" text-anchor="middle" font-style="italic">Salt Guild</text>
    <text x="120" y="706" fill="#9bc0e6" font-size="9" text-anchor="middle" font-family="monospace">household · 9</text>
    <!-- standing as banner fill height -->
    <text x="200" y="620" fill="#9fd08a" font-size="11" font-family="monospace">standing = how full the</text>
    <text x="200" y="636" fill="#bcd9ad" font-size="11" font-family="monospace">banner hangs; sigil glyph</text>
    <text x="200" y="652" fill="#bcd9ad" font-size="11" font-family="monospace">auto-picked from kind;</text>
    <text x="200" y="668" fill="#bcd9ad" font-size="11" font-family="monospace">members = threads on the hem.</text>
    <g stroke="#cda84e" stroke-opacity="0.3"><line x1="78" y1="714" x2="78" y2="726"/><line x1="98" y1="714" x2="98" y2="730"/><line x1="118" y1="714" x2="118" y2="724"/><line x1="138" y1="714" x2="138" y2="730"/><line x1="162" y1="714" x2="162" y2="722"/></g>
  </g>

  <!-- Bond: the "knot" / tug-of-war -->
  <text x="450" y="576" fill="#6f6655" font-family="monospace" font-size="12">BOND · tug-of-war between two portraits</text>
  <g>
    <circle cx="500" cy="640" r="30" fill="url(#av)" stroke="#cda84e" stroke-opacity="0.5"/><text x="500" y="648" fill="#cda84e" font-size="18" text-anchor="middle" font-style="italic">A</text>
    <circle cx="780" cy="640" r="30" fill="url(#av)" stroke="#cda84e" stroke-opacity="0.5"/><text x="780" y="648" fill="#cda84e" font-size="18" text-anchor="middle" font-style="italic">C</text>
    <text x="500" y="690" fill="#e7d6ad" font-size="12" text-anchor="middle">Aveline</text>
    <text x="780" y="690" fill="#e7d6ad" font-size="12" text-anchor="middle">Coren</text>
    <!-- affection rope (taut, warm) -->
    <text x="540" y="612" fill="#6f6655" font-size="9" font-family="monospace">affection</text>
    <path d="M530 620 Q640 610 750 620" fill="none" stroke="url(#aff)" stroke-width="4"/>
    <circle cx="700" cy="616" r="5" fill="#a9c089"/><!-- knot pulled toward Coren = he loves more -->
    <!-- trust rope (slack, cool, frayed on her side) -->
    <text x="556" y="676" fill="#6f6655" font-size="9" font-family="monospace">trust</text>
    <path d="M530 660 Q640 686 750 660" fill="none" stroke="url(#tru)" stroke-width="4" stroke-dasharray="6 4"/>
    <circle cx="585" cy="676" r="5" fill="#9bc0e6"/><!-- knot toward Aveline side = she trusts less -->
    <text x="820" y="624" fill="#9fd08a" font-size="11" font-family="monospace">two ropes = two axes. The KNOT's</text>
    <text x="820" y="640" fill="#bcd9ad" font-size="11" font-family="monospace">position shows who feels more;</text>
    <text x="820" y="656" fill="#bcd9ad" font-size="11" font-family="monospace">a frayed/dashed rope = mistrust.</text>
    <text x="820" y="672" fill="#bcd9ad" font-size="11" font-family="monospace">Asymmetry is instantly physical.</text>
  </g>

  <!-- Bond alt: orbit -->
  <text x="450" y="750" fill="#6f6655" font-family="monospace" font-size="12">BOND alt · orbit (one circles the other)</text>
  <g>
    <ellipse cx="600" cy="850" rx="120" ry="60" fill="none" stroke="#b48ed0" stroke-opacity="0.3" stroke-dasharray="4 5"/>
    <circle cx="600" cy="850" r="28" fill="url(#av)" stroke="#cda84e" stroke-opacity="0.5"/><text x="600" y="858" fill="#cda84e" font-size="16" text-anchor="middle" font-style="italic">A</text>
    <circle cx="720" cy="850" r="18" fill="url(#av)" stroke="#b48ed0" stroke-opacity="0.6"/><text x="720" y="856" fill="#c79ae0" font-size="12" text-anchor="middle" font-style="italic">C</text>
    <text x="600" y="922" fill="#9a8f78" font-size="11" text-anchor="middle" font-style="italic">Coren orbits Aveline — one-sided romance</text>
    <text x="790" y="844" fill="#9fd08a" font-size="11" font-family="monospace">orbit radius = distance/closeness;</text>
    <text x="790" y="860" fill="#bcd9ad" font-size="11" font-family="monospace">who orbits whom = who's devoted.</text>
    <text x="790" y="876" fill="#bcd9ad" font-size="11" font-family="monospace">Mutual bonds = a shared center.</text>
  </g>

  <text x="40" y="958" fill="#cda84e" font-size="12" font-style="italic" opacity="0.7">All concepts reuse existing data (status, affection, trust, standing). Each can be theme-gated: Signet→Fantasy, Contact→Futuristic, Vitals→Modern, Tarot/Dossier→default galleries.</text>
</svg>
