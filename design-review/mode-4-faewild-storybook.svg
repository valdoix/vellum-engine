<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="980" viewBox="0 0 1100 980" font-family="'Cormorant Garamond',Georgia,serif">
  <defs>
    <radialGradient id="glade" cx="50%" cy="26%" r="88%">
      <stop offset="0" stop-color="#2f2a4a"/><stop offset="0.5" stop-color="#242a3c"/><stop offset="1" stop-color="#161e19"/>
    </radialGradient>
    <linearGradient id="bark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2338"/><stop offset="1" stop-color="#181521"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a6d6a0"/><stop offset="1" stop-color="#5f9a68"/></linearGradient>
    <radialGradient id="bulb" cx="50%" cy="38%" r="62%"><stop offset="0" stop-color="#fff4cc"/><stop offset="1" stop-color="#f0c65a"/></radialGradient>
    <radialGradient id="med" cx="42%" cy="30%" r="78%"><stop offset="0" stop-color="#4a4266"/><stop offset="1" stop-color="#241f34"/></radialGradient>
    <radialGradient id="capg" cx="50%" cy="28%" r="72%"><stop offset="0" stop-color="#eaa0b6"/><stop offset="1" stop-color="#9c5470"/></radialGradient>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.035"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="2.4"/></filter>
  </defs>

  <!-- bark frame -->
  <rect width="1100" height="980" fill="url(#bark)"/>
  <rect x="20" y="20" width="1060" height="940" rx="20" fill="none" stroke="#7fae7a" stroke-width="2" stroke-opacity="0.45"/>
  <!-- climbing vine border along the frame -->
  <path d="M40 60 q14 40 0 80 q-14 40 0 80 q14 40 0 80 q-14 40 0 80 q14 40 0 80 q-14 40 0 80 q14 40 0 80 q-14 40 0 80 q14 30 0 60" fill="none" stroke="url(#leaf)" stroke-width="2.5" stroke-opacity="0.6"/>
  <g fill="#a6d6a0" opacity="0.5"><ellipse cx="32" cy="160" rx="8" ry="3.5" transform="rotate(-40 32 160)"/><ellipse cx="48" cy="320" rx="8" ry="3.5" transform="rotate(40 48 320)"/><ellipse cx="32" cy="500" rx="8" ry="3.5" transform="rotate(-40 32 500)"/><ellipse cx="48" cy="680" rx="8" ry="3.5" transform="rotate(40 48 680)"/><ellipse cx="32" cy="840" rx="8" ry="3.5" transform="rotate(-40 32 840)"/></g>
  <path d="M1060 60 q-14 40 0 80 q14 40 0 80 q-14 40 0 80 q14 40 0 80 q-14 40 0 80 q14 40 0 80 q-14 40 0 80 q14 40 0 80 q-14 30 0 60" fill="none" stroke="url(#leaf)" stroke-width="2.5" stroke-opacity="0.6"/>

  <!-- the glade page -->
  <rect x="48" y="48" width="1004" height="884" rx="16" fill="url(#glade)" filter="url(#rough)"/>

  <!-- fairy-light string strung across the very top (the "title bar" garland) -->
  <path d="M70 96 Q300 130 550 96 T1030 96" fill="none" stroke="#5f9a68" stroke-width="1.5" opacity="0.6"/>
  <g>
    <circle cx="150" cy="112" r="6" fill="url(#bulb)"/><circle cx="150" cy="112" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
    <circle cx="300" cy="122" r="6" fill="url(#bulb)"/><circle cx="300" cy="122" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
    <circle cx="450" cy="112" r="6" fill="url(#bulb)"/><circle cx="450" cy="112" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
    <circle cx="650" cy="112" r="6" fill="url(#bulb)"/><circle cx="650" cy="112" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
    <circle cx="800" cy="122" r="6" fill="url(#bulb)"/><circle cx="800" cy="122" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
    <circle cx="950" cy="112" r="6" fill="url(#bulb)"/><circle cx="950" cy="112" r="10" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
  </g>

  <!-- toadstool tabs (the "tabs") — mushroom-cap domes rising from the ground -->
  <g font-family="'Cormorant Garamond',Georgia" font-size="14" letter-spacing="0.5">
    <g><path d="M120 176 Q120 148 165 148 Q210 148 210 176 V150 H120 Z" fill="none"/><path d="M118 168 Q118 138 165 138 Q212 138 212 168 Z" fill="url(#capg)"/><g fill="#f6dbe8"><circle cx="148" cy="156" r="2.5"/><circle cx="182" cy="152" r="3"/></g><rect x="145" y="166" width="40" height="16" rx="4" fill="#3a2f4a"/><text x="165" y="178" fill="#f6dbe8" text-anchor="middle" font-style="italic">Now</text></g>
    <g opacity="0.75"><path d="M226 168 Q226 142 265 142 Q304 142 304 168 Z" fill="#5f9a68"/><g fill="#d8ecd0"><circle cx="252" cy="155" r="2.5"/><circle cx="282" cy="152" r="2.5"/></g><rect x="248" y="166" width="34" height="14" rx="4" fill="#2a3327"/><text x="265" y="177" fill="#e2f0da" text-anchor="middle" font-style="italic">Cast</text></g>
    <g opacity="0.75"><path d="M320 168 Q320 142 362 142 Q404 142 404 168 Z" fill="#7a6cae"/><g fill="#e6def5"><circle cx="346" cy="155" r="2.5"/><circle cx="378" cy="152" r="2.5"/></g><rect x="340" y="166" width="44" height="14" rx="4" fill="#2c2740"/><text x="362" y="177" fill="#e6def5" text-anchor="middle" font-style="italic">Bonds</text></g>
    <g opacity="0.75"><path d="M420 168 Q420 142 468 142 Q516 142 516 168 Z" fill="#c98a4a"/><g fill="#f5e2c8"><circle cx="448" cy="155" r="2.5"/><circle cx="486" cy="152" r="2.5"/></g><rect x="436" y="166" width="64" height="14" rx="4" fill="#3a2f22"/><text x="468" y="177" fill="#f5e2c8" text-anchor="middle" font-style="italic">Chronicle</text></g>
  </g>

  <!-- ================= LEFT PAGE: the living glade ================= -->
  <text x="90" y="232" fill="#a6d6a0" font-size="15" letter-spacing="4" font-style="italic">&#127811; Once, at the hour of dusk &#127811;</text>
  <path d="M90 244 Q300 236 510 244" fill="none" stroke="#a6d6a0" stroke-opacity="0.4"/>

  <!-- storybook drop-cap in a leaf frame + scene -->
  <path d="M90 262 q0 -6 30 -6 h34 v64 h-34 q-30 0 -30 -6 z" fill="#3a5a3f" stroke="#a6d6a0" stroke-opacity="0.6"/>
  <text x="122" y="312" fill="#d8ecd0" font-size="50" text-anchor="middle" font-style="italic">T</text>
  <path d="M92 258 q-6 -6 0 -10" fill="none" stroke="#a6d6a0" stroke-width="1.5"/><ellipse cx="88" cy="250" rx="6" ry="3" fill="#a6d6a0" opacity="0.8" transform="rotate(-30 88 250)"/>
  <text x="168" y="282" fill="#ece6f5" font-size="18" font-style="italic">he drowned chapel, where</text>
  <text x="168" y="308" fill="#ece6f5" font-size="18" font-style="italic">ivy has cracked the altar</text>
  <text x="90" y="344" fill="#ece6f5" font-size="18" font-style="italic">stones and the water beads black.</text>

  <!-- tension as a fairy-light string -->
  <text x="90" y="386" fill="#e79ab0" font-size="12" letter-spacing="2">PERIL</text>
  <path d="M148 382 Q180 400 212 382 T276 382 T340 382" fill="none" stroke="#5f9a68" stroke-width="1.5" opacity="0.6"/>
  <g>
    <circle cx="152" cy="384" r="6" fill="url(#bulb)"/><circle cx="152" cy="384" r="9" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
    <circle cx="184" cy="392" r="6" fill="url(#bulb)"/><circle cx="184" cy="392" r="9" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
    <circle cx="216" cy="384" r="6" fill="url(#bulb)"/><circle cx="216" cy="384" r="9" fill="#ffe6a0" opacity="0.3" filter="url(#glow)"/>
    <circle cx="248" cy="392" r="6" fill="url(#bulb)"/>
    <circle cx="280" cy="384" r="6" fill="#f0a05a"/>
    <circle cx="312" cy="392" r="6" fill="#e07a94"/>
    <circle cx="344" cy="384" r="6" fill="#3a3448" stroke="#c9b6f0" stroke-opacity="0.3"/>
  </g>
  <text x="380" y="388" fill="#e79ab0" font-size="13" font-style="italic">seven of ten alight</text>

  <!-- those present — toadstool cards with firefly presence -->
  <text x="90" y="432" fill="#a6d6a0" font-size="13" letter-spacing="3" font-style="italic">&#8212; THOSE IN THE GLADE &#8212;</text>

  <!-- Aveline, present (toadstool dome) -->
  <path d="M90 456 Q90 446 220 446 Q510 446 510 456 V552 Q510 562 500 562 H100 Q90 562 90 552 Z" fill="#2b2c42" fill-opacity="0.72" stroke="#a6d6a0" stroke-opacity="0.3"/>
  <path d="M104 462 Q300 448 496 462" fill="none" stroke="#eaa0b6" stroke-opacity="0.45" stroke-width="2"/>
  <g fill="#f0d8ea" opacity="0.6"><circle cx="200" cy="456" r="2.5"/><circle cx="300" cy="452" r="3"/><circle cx="400" cy="456" r="2.5"/></g>
  <circle cx="140" cy="512" r="34" fill="url(#med)" stroke="#a6d6a0" stroke-width="2"/>
  <circle cx="140" cy="512" r="40" fill="none" stroke="#a6d6a0" stroke-opacity="0.5" filter="url(#glow)"/>
  <text x="140" y="522" fill="#ece6f5" font-size="24" text-anchor="middle" font-style="italic">A</text>
  <circle cx="168" cy="486" r="5" fill="#a6d6a0" filter="url(#glow)"/>
  <text x="196" y="496" fill="#ece6f5" font-size="20">Sister Aveline</text>
  <text x="196" y="518" fill="#a6d6a0" font-size="13" font-style="italic">wary · and bleeding still</text>
  <text x="196" y="542" fill="#c9b6f0" font-size="14" font-style="italic">&#8220;He swore the door was sealed. He lied.&#8221;</text>

  <!-- Coren, present -->
  <path d="M90 578 Q90 568 220 568 Q510 568 510 578 V662 Q510 672 500 672 H100 Q90 672 90 662 Z" fill="#2b2c42" fill-opacity="0.72" stroke="#8fbf88" stroke-opacity="0.28"/>
  <path d="M104 584 Q300 570 496 584" fill="none" stroke="#8fbf88" stroke-opacity="0.4" stroke-width="2"/>
  <circle cx="140" cy="624" r="30" fill="url(#med)" stroke="#8fbf88" stroke-width="2"/>
  <text x="140" y="632" fill="#ece6f5" font-size="22" text-anchor="middle" font-style="italic">C</text>
  <circle cx="166" cy="602" r="5" fill="#8fbf88" filter="url(#glow)"/>
  <text x="190" y="608" fill="#ece6f5" font-size="20">Coren</text>
  <text x="190" y="630" fill="#8fbf88" font-size="13" font-style="italic">guarded · blade half-drawn</text>
  <text x="190" y="654" fill="#c9b6f0" font-size="14" font-style="italic">stands between her and the dark.</text>

  <!-- marginalia sprout -->
  <text x="96" y="716" fill="#a6d6a0" font-size="11" font-style="italic" transform="rotate(-4 96 716)">a hollow oak, a second way out</text>
  <path d="M90 730 q30 -18 60 0 q30 18 60 0" fill="none" stroke="#7fae7a" stroke-opacity="0.5" stroke-width="1.5"/>
  <ellipse cx="150" cy="726" rx="7" ry="3" fill="#a6d6a0" opacity="0.6" transform="rotate(20 150 726)"/>

  <!-- lately written — as glowing motes on a vine -->
  <text x="90" y="770" fill="#a6d6a0" font-size="13" letter-spacing="3" font-style="italic">&#8212; LATELY WOVEN &#8212;</text>
  <g font-size="14" fill="#ece6f5" font-style="italic">
    <text x="90" y="800"><tspan fill="#e79ab0" font-style="normal" font-size="11">&#10047;</tspan>  Aveline vows: &#8220;I will not kneel to him again.&#8221;</text>
    <text x="90" y="826"><tspan fill="#7a9be6" font-style="normal" font-size="11">&#127811;</tspan>  Coren finds the hollow oak — a second way out.</text>
    <text x="90" y="852"><tspan fill="#f0c65a" font-style="normal" font-size="11">&#9906;</tspan>  A secret glows dim: she bears the Vicar's seal.</text>
  </g>

  <!-- center trellis divider (the gutter) -->
  <path d="M550 168 q16 40 0 80 q-16 40 0 80 q16 40 0 80 q-16 40 0 80 q16 40 0 80 q-16 40 0 80 q16 40 0 80 q-16 40 0 80" fill="none" stroke="url(#leaf)" stroke-width="2" stroke-opacity="0.4"/>
  <g fill="#a6d6a0" opacity="0.4"><ellipse cx="542" cy="260" rx="7" ry="3" transform="rotate(-40 542 260)"/><ellipse cx="558" cy="420" rx="7" ry="3" transform="rotate(40 558 420)"/><ellipse cx="542" cy="580" rx="7" ry="3" transform="rotate(-40 542 580)"/><ellipse cx="558" cy="740" rx="7" ry="3" transform="rotate(40 558 740)"/></g>

  <!-- ================= RIGHT PAGE: bonds as entwined vines ================= -->
  <text x="600" y="232" fill="#a6d6a0" font-size="15" letter-spacing="4" font-style="italic">&#127811; Of bonds &amp; the vines between &#127811;</text>
  <path d="M600 244 Q800 236 1010 244" fill="none" stroke="#a6d6a0" stroke-opacity="0.4"/>

  <!-- vine-clasp bond card -->
  <rect x="600" y="266" width="410" height="150" rx="22" fill="#2b2c42" fill-opacity="0.7" stroke="#a6d6a0" stroke-opacity="0.28"/>
  <circle cx="680" cy="332" r="40" fill="url(#med)" stroke="#a6d6a0" stroke-width="2"/><text x="680" y="342" fill="#ece6f5" font-size="22" text-anchor="middle" font-style="italic">A</text>
  <circle cx="930" cy="332" r="40" fill="url(#med)" stroke="#e79ab0" stroke-width="2" stroke-dasharray="5 4"/><text x="930" y="342" fill="#ece6f5" font-size="22" text-anchor="middle" font-style="italic">C</text>
  <text x="680" y="292" fill="#ece6f5" font-size="15" text-anchor="middle" font-style="italic">Aveline</text>
  <text x="930" y="292" fill="#ece6f5" font-size="15" text-anchor="middle" font-style="italic">Coren</text>
  <!-- entwined vines: her side (affection full, trust faint), his side (devout, growing) -->
  <path d="M724 320 q40 -24 86 0" fill="none" stroke="url(#leaf)" stroke-width="2.5"/>
  <path d="M810 320 q40 24 86 0" fill="none" stroke="url(#leaf)" stroke-width="2.5"/>
  <text x="700" y="332" fill="#8fbf88" font-size="10" text-anchor="middle" font-style="italic">affection</text>
  <text x="700" y="348" fill="#a6d6a0" font-size="14" text-anchor="middle">&#127811;&#127811;&#127811;&#127811;&#127811;&#127811;</text>
  <text x="700" y="366" fill="#e79ab0" font-size="10" text-anchor="middle" font-style="italic">trust, faint</text>
  <text x="700" y="382" fill="#e79ab0" font-size="14" text-anchor="middle">&#127811;&#127811;</text>
  <text x="912" y="332" fill="#8fbf88" font-size="10" text-anchor="middle" font-style="italic">affection</text>
  <text x="912" y="348" fill="#a6d6a0" font-size="14" text-anchor="middle">&#127811;&#127811;&#127811;&#127811;&#127811;&#127811;&#127811;</text>
  <text x="912" y="366" fill="#7a9be6" font-size="10" text-anchor="middle" font-style="italic">trust, growing</text>
  <text x="912" y="382" fill="#7a9be6" font-size="14" text-anchor="middle">&#127811;&#127811;&#127811;&#127811;</text>
  <text x="805" y="406" fill="#c9b6f0" font-size="13" text-anchor="middle" font-style="italic">a one-sided romance, an even alliance</text>

  <!-- flowering knot divider -->
  <path d="M640 442 q40 -22 80 0 q40 22 80 0 q40 -22 80 0 q40 22 80 0" fill="none" stroke="url(#leaf)" stroke-opacity="0.6" stroke-width="2"/>
  <g fill="#e79ab0" opacity="0.7"><circle cx="720" cy="442" r="3"/><circle cx="880" cy="442" r="3"/></g>

  <!-- dramatis personae as a roster of sprouts -->
  <text x="600" y="492" fill="#a6d6a0" font-size="13" letter-spacing="3" font-style="italic">&#8212; THOSE OF THE TALE &#8212;</text>
  <g font-size="15" fill="#ece6f5">
    <text x="600" y="526" font-style="italic"><tspan fill="#8fbf88" font-style="normal">&#127811;</tspan> Sister Aveline <tspan fill="#a6d6a0" font-size="12">— cleric, of four-and-thirty</tspan></text>
    <text x="600" y="556" font-style="italic"><tspan fill="#8fbf88" font-style="normal">&#127811;</tspan> Coren <tspan fill="#a6d6a0" font-size="12">— sellsword, sworn unwillingly</tspan></text>
    <text x="600" y="586" font-style="italic" opacity="0.65"><tspan fill="#8f88b0" font-style="normal">&#127810;</tspan> The Vicar <tspan fill="#8f88b0" font-size="12">— gone from the glade, &amp; the worse for it</tspan></text>
    <line x1="600" y1="568" x2="1010" y2="568" stroke="#a6d6a0" stroke-opacity="0.22"/>
  </g>

  <!-- what is believed — dramatic irony as a mossy gloss -->
  <text x="600" y="636" fill="#a6d6a0" font-size="13" letter-spacing="3" font-style="italic">&#8212; WHAT IS BELIEVED &#8212;</text>
  <g font-size="14" fill="#ece6f5" font-style="italic">
    <text x="600" y="668">Coren <tspan fill="#7a9be6" font-style="normal" font-size="11">believes</tspan> the Vicar dead &#8212;</text>
    <text x="624" y="690" fill="#e79ab0">though it is <tspan text-decoration="underline">not so</tspan>.</text>
    <text x="600" y="722">Aveline <tspan fill="#e79ab0" font-style="normal" font-size="11">once held</tspan> <tspan text-decoration="line-through" fill="#8f88b0">Coren a traitor</tspan></text>
    <text x="624" y="744" fill="#8fbf88">&#8212; a thorn, pulled, but the skin still tender.</text>
  </g>

  <!-- hanging lantern as the "actions" / close affordance -->
  <path d="M940 792 q0 -14 10 -16" fill="none" stroke="#c9a24a" stroke-width="1.5"/><circle cx="952" cy="776" r="5" fill="none" stroke="#c9a24a" stroke-width="1.5"/>
  <circle cx="940" cy="836" r="46" fill="url(#bulb)"/>
  <circle cx="940" cy="836" r="56" fill="#ffe6a0" opacity="0.25" filter="url(#glow)"/>
  <circle cx="940" cy="836" r="38" fill="none" stroke="#c9a24a" stroke-width="1" stroke-opacity="0.6"/>
  <text x="940" y="832" fill="#6a4a10" font-size="20" text-anchor="middle" font-style="italic">&#10022;</text>
  <text x="940" y="852" fill="#7a5410" font-size="8" text-anchor="middle" letter-spacing="2">CLOSE</text>
  <text x="808" y="828" fill="#a6d6a0" font-size="12" font-style="italic" text-anchor="end">dim the lantern</text>
  <text x="808" y="846" fill="#a6d6a0" font-size="12" font-style="italic" text-anchor="end">to close the glade &#8594;</text>

  <!-- corner brambles -->
  <path d="M64 64 q30 4 32 34 M64 64 q4 30 34 32" fill="none" stroke="#7fae7a" stroke-opacity="0.6" stroke-width="1.5"/>
  <ellipse cx="86" cy="80" rx="7" ry="3" fill="#a6d6a0" opacity="0.6" transform="rotate(45 86 80)"/>
  <path d="M1036 64 q-30 4 -32 34 M1036 64 q-4 30 -34 32" fill="none" stroke="#7fae7a" stroke-opacity="0.6" stroke-width="1.5"/>
  <ellipse cx="1014" cy="80" rx="7" ry="3" fill="#a6d6a0" opacity="0.6" transform="rotate(-45 1014 80)"/>

  <!-- title toadstool plate at the bottom -->
  <path d="M430 890 Q430 872 550 872 Q670 872 670 890 V918 Q670 926 662 926 H438 Q430 926 430 918 Z" fill="#5f9a68"/>
  <g fill="#d8ecd0"><circle cx="480" cy="884" r="3"/><circle cx="550" cy="880" r="3.5"/><circle cx="620" cy="884" r="3"/></g>
  <text x="550" y="914" fill="#f2f7ee" font-size="17" text-anchor="middle" letter-spacing="5" font-style="italic">VELLVM · FAEWILD</text>

  <!-- caption -->
  <text x="60" y="968" fill="#a6d6a0" font-size="13" font-style="italic" opacity="0.75">IV · FAIRY TALE / NATURE — &#8220;Faewild&#8221;: a twilight storybook glade. Toadstool tabs, fairy-light garlands, climbing-vine dividers, vine-clasp bonds, a hanging-lantern close. Pastels on dusk.</text>
</svg>
