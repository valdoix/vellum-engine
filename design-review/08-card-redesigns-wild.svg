<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1000" viewBox="0 0 1280 1000" font-family="Georgia, serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#181410"/><stop offset="1" stop-color="#0c0a07"/></linearGradient>
    <radialGradient id="av2" cx="40%" cy="35%" r="75%"><stop offset="0" stop-color="#3a2f1a"/><stop offset="1" stop-color="#1d180f"/></radialGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#cda84e"/><stop offset="0.5" stop-color="#f2e4bd"/><stop offset="1" stop-color="#9a6f1e"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="1280" height="1000" fill="url(#bg2)"/>
  <text x="40" y="50" fill="#cda84e" font-size="25" letter-spacing="2">CARD REDESIGNS · II — wild &amp; theme-native</text>
  <text x="40" y="74" fill="#9a8f78" font-size="14" font-style="italic">The experimental tier: relationship-aware cards, a stacked deck, and an expand interaction.</text>

  <!-- ===== 1. THE SPREAD: cast as a fanned hand of cards ===== -->
  <text x="40" y="116" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">1 · THE HAND — present cast fanned like cards you hold</text>
  <g filter="url(#sh)">
    <g transform="rotate(-14 250 300)"><rect x="80" y="150" width="120" height="170" rx="10" fill="#1c1206" stroke="#cda84e" stroke-opacity="0.4"/><circle cx="140" cy="200" r="30" fill="url(#av2)"/><text x="140" y="208" fill="#cda84e" font-size="20" text-anchor="middle" font-style="italic">V</text><text x="140" y="262" fill="#e7d6ad" font-size="12" text-anchor="middle">The Vicar</text><text x="140" y="280" fill="#9a8f78" font-size="8" text-anchor="middle" font-family="monospace">MENTIONED</text></g>
    <g transform="rotate(-5 250 300)"><rect x="170" y="135" width="120" height="175" rx="10" fill="#1c1206" stroke="#cda84e" stroke-opacity="0.5"/><circle cx="230" cy="186" r="30" fill="url(#av2)"/><text x="230" y="194" fill="#cda84e" font-size="20" text-anchor="middle" font-style="italic">C</text><text x="230" y="250" fill="#e7d6ad" font-size="12" text-anchor="middle">Coren</text><text x="230" y="268" fill="#a9c089" font-size="8" text-anchor="middle" font-family="monospace">GUARDED</text></g>
    <g transform="rotate(6 250 300)"><rect x="262" y="132" width="124" height="180" rx="10" fill="#231708" stroke="#cda84e" stroke-width="1.5"/><circle cx="324" cy="186" r="32" fill="url(#av2)" stroke="#8fa67e" stroke-width="2"/><text x="324" y="195" fill="#cda84e" font-size="22" text-anchor="middle" font-style="italic">A</text><text x="324" y="252" fill="#f2e4bd" font-size="13" text-anchor="middle">Aveline</text><text x="324" y="270" fill="#a9c089" font-size="8" text-anchor="middle" font-family="monospace">PRESENT ◉</text></g>
  </g>
  <text x="430" y="180" fill="#9fd08a" font-size="12" font-family="monospace">"who's in the scene" as a hand of cards</text>
  <text x="430" y="200" fill="#bcd9ad" font-size="12" font-family="monospace">you're holding. Present = raised &amp; lit;</text>
  <text x="430" y="220" fill="#bcd9ad" font-size="12" font-family="monospace">mentioned = tucked behind. Hover lifts</text>
  <text x="430" y="240" fill="#bcd9ad" font-size="12" font-family="monospace">a card out. Pure presence, at a glance —</text>
  <text x="430" y="260" fill="#bcd9ad" font-size="12" font-family="monospace">ideal for the floating "Now" window.</text>

  <!-- ===== 2. RELATIONSHIP-AWARE: card edges lean toward allies ===== -->
  <text x="850" y="116" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">2 · CONSTELLATION — cards tethered by live bonds</text>
  <g>
    <line x1="980" y1="210" x2="1120" y2="180" stroke="#8fa67e" stroke-width="2.5" stroke-opacity="0.6"/>
    <line x1="980" y1="210" x2="1080" y2="300" stroke="#c96a6a" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="5 4"/>
    <rect x="910" y="185" width="120" height="56" rx="10" fill="#221d15" stroke="#8fa67e" stroke-opacity="0.5"/>
    <circle cx="938" cy="213" r="16" fill="url(#av2)"/><text x="938" y="218" fill="#cda84e" font-size="11" text-anchor="middle">A</text>
    <text x="960" y="210" fill="#f2e4bd" font-size="12">Aveline</text><text x="960" y="226" fill="#a9c089" font-size="8" font-family="monospace">PRESENT</text>
    <rect x="1062" y="156" width="116" height="52" rx="10" fill="#221d15" stroke="#8fa67e" stroke-opacity="0.4"/>
    <circle cx="1088" cy="182" r="14" fill="url(#av2)"/><text x="1088" y="187" fill="#cda84e" font-size="10" text-anchor="middle">C</text>
    <text x="1108" y="180" fill="#e7d6ad" font-size="11">Coren</text><text x="1108" y="195" fill="#9a8f78" font-size="8" font-family="monospace">ally</text>
    <rect x="1024" y="282" width="116" height="50" rx="10" fill="#221d15" stroke="#c96a6a" stroke-opacity="0.4"/>
    <circle cx="1049" cy="307" r="13" fill="url(#av2)"/><text x="1049" y="312" fill="#cda84e" font-size="10" text-anchor="middle">V</text>
    <text x="1068" y="305" fill="#e7d6ad" font-size="11">Vicar</text><text x="1068" y="320" fill="#e09090" font-size="8" font-family="monospace">rival</text>
  </g>
  <text x="850" y="370" fill="#9fd08a" font-size="11" font-family="monospace">cast cards as a mini force-graph: green tether=ally,</text>
  <text x="850" y="386" fill="#bcd9ad" font-size="11" font-family="monospace">red dashed=rival. The selected card pulls its bonds in.</text>

  <!-- ===== 3. THE EXPAND interaction (collapsed → open) ===== -->
  <text x="40" y="420" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">3 · UNFOLD — one card, two states (tap to open)</text>
  <!-- collapsed -->
  <g>
    <rect x="40" y="436" width="300" height="56" rx="13" fill="#221d15" stroke="#cda84e" stroke-opacity="0.16"/>
    <rect x="40" y="436" width="4" height="56" rx="2" fill="#8fa67e"/>
    <circle cx="72" cy="464" r="17" fill="url(#av2)"/><circle cx="85" cy="452" r="4" fill="#8fa67e" stroke="#221d15" stroke-width="2"/>
    <text x="72" y="469" fill="#cda84e" font-size="13" text-anchor="middle" font-style="italic">A</text>
    <text x="100" y="460" fill="#f2e4bd" font-size="15">Sister Aveline</text>
    <text x="100" y="478" fill="#a9c089" font-size="11" font-style="italic">present · Cleric, 34</text>
    <text x="322" y="470" fill="#9a8f78" font-size="13" font-family="monospace">⌄</text>
  </g>
  <text x="356" y="468" fill="#6f6655" font-size="20">→</text>
  <!-- expanded -->
  <g>
    <rect x="392" y="436" width="320" height="180" rx="13" fill="#221d15" stroke="#cda84e" stroke-opacity="0.3"/>
    <rect x="392" y="436" width="4" height="180" rx="2" fill="#8fa67e"/>
    <circle cx="426" cy="470" r="20" fill="url(#av2)"/><circle cx="441" cy="456" r="5" fill="#8fa67e" stroke="#221d15" stroke-width="2"/>
    <text x="426" y="476" fill="#cda84e" font-size="15" text-anchor="middle" font-style="italic">A</text>
    <text x="458" y="464" fill="#f2e4bd" font-size="16">Sister Aveline</text>
    <text x="458" y="482" fill="#a9c089" font-size="11" font-style="italic">present · Cleric, 34</text>
    <text x="322" y="470" fill="#9a8f78" font-size="13"></text>
    <line x1="410" y1="500" x2="694" y2="500" stroke="#cda84e" stroke-opacity="0.12"/>
    <text x="410" y="520" fill="#b3a888" font-size="11.5">Auburn hair, a burn scar along the jaw.</text>
    <text x="410" y="540" fill="#9a8f78" font-size="10" font-family="monospace">ALSO KNOWN AS · the Pale Sister</text>
    <!-- inline bond chips -->
    <text x="410" y="562" fill="#6f6655" font-size="9" font-family="monospace">BONDS</text>
    <rect x="452" y="552" width="92" height="16" rx="5" fill="#8fa67e" fill-opacity="0.16"/><text x="460" y="564" fill="#a9c089" font-size="9" font-family="monospace">Coren · ally</text>
    <rect x="550" y="552" width="98" height="16" rx="5" fill="#c96a6a" fill-opacity="0.16"/><text x="558" y="564" fill="#e09090" font-size="9" font-family="monospace">Vicar · rival</text>
    <g fill="#9a8f78" font-size="11" font-family="monospace"><text x="640" y="460">⤴</text><text x="660" y="460">✎</text><text x="680" y="460" fill="#c96a6a">✕</text></g>
    <text x="410" y="592" fill="#b3a888" font-size="11" font-style="italic">"He said the door was sealed. He lied."</text>
  </g>
  <text x="392" y="638" fill="#9fd08a" font-size="11" font-family="monospace">list stays scannable (collapsed); tap reveals appearance, aka, inline bonds &amp; last line.</text>

  <!-- ===== 4. STAT-BLOCK (RPG character sheet) ===== -->
  <text x="850" y="420" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">4 · STAT-BLOCK — an RPG sheet card</text>
  <g font-family="monospace">
    <rect x="850" y="436" width="390" height="180" rx="6" fill="#1d1a14" stroke="#cda84e" stroke-opacity="0.3"/>
    <rect x="850" y="436" width="390" height="34" rx="6" fill="#cda84e" fill-opacity="0.1"/>
    <text x="866" y="459" fill="#f2e4bd" font-size="15" font-family="Georgia">Sister Aveline</text>
    <text x="1224" y="459" fill="#cda84e" font-size="11" text-anchor="end">CLERIC · LVL 34</text>
    <circle cx="892" cy="528" r="32" fill="url(#av2)" stroke="#cda84e" stroke-opacity="0.4"/><text x="892" y="536" fill="#cda84e" font-size="22" text-anchor="middle" font-style="italic">A</text>
    <!-- stat pips -->
    <g font-size="10" fill="#b3a888">
      <text x="946" y="496">RESOLVE</text><text x="1090" y="496" fill="#a9c089">●●●●●●●○○○</text>
      <text x="946" y="516">TRUST</text><text x="1090" y="516" fill="#9bc0e6">●●●○○○○○○○</text>
      <text x="946" y="536">FAITH</text><text x="1090" y="536" fill="#cda84e">●●●●●●●●○○</text>
      <text x="946" y="556">PERIL</text><text x="1090" y="556" fill="#c96a6a">●●●●●●●○○○</text>
    </g>
    <line x1="866" y1="572" x2="1224" y2="572" stroke="#cda84e" stroke-opacity="0.15"/>
    <text x="866" y="592" fill="#8a8071" font-size="9">CONDITION</text><text x="946" y="592" fill="#e09090" font-size="9">bleeding</text>
    <text x="1060" y="592" fill="#8a8071" font-size="9">STATUS</text><text x="1130" y="592" fill="#a9c089" font-size="9">PRESENT</text>
  </g>
  <text x="850" y="638" fill="#9fd08a" font-size="11" font-family="monospace">maps existing scalars (affection→trust, tension→peril) to pip meters. Game-y, fun, dense.</text>

  <!-- ===== 5. POLAROID / MEMORY (journal-linked) ===== -->
  <text x="40" y="690" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">5 · KEEPSAKE — a polaroid with a handwritten last line</text>
  <g filter="url(#sh)">
    <rect x="60" y="706" width="150" height="180" rx="3" fill="#f4efe2"/>
    <rect x="72" y="718" width="126" height="118" fill="url(#av2)"/>
    <text x="135" y="788" fill="#cda84e" font-size="34" text-anchor="middle" font-style="italic">A</text>
    <!-- presence corner fold -->
    <path d="M186 718 l12 0 l0 12 z" fill="#8fa67e"/>
    <text x="135" y="864" fill="#3a2c20" font-size="13" text-anchor="middle" font-style="italic">Sister Aveline</text>
  </g>
  <text x="240" y="740" fill="#9fd08a" font-size="11" font-family="monospace">a photo print: the corner fold</text>
  <text x="240" y="756" fill="#bcd9ad" font-size="11" font-family="monospace">color = status, handwritten</text>
  <text x="240" y="772" fill="#bcd9ad" font-size="11" font-family="monospace">caption = name. Warm, personal —</text>
  <text x="240" y="788" fill="#bcd9ad" font-size="11" font-family="monospace">great for a "cast wall" pinboard view.</text>

  <!-- ===== 6. THE STRIP (ultra-compact list row) ===== -->
  <text x="560" y="690" fill="#6f6655" font-family="monospace" font-size="12" letter-spacing="1">6 · STRIP — density mode for huge casts</text>
  <g font-family="Georgia">
    <rect x="560" y="706" width="680" height="30" rx="6" fill="#221d15"/><rect x="560" y="706" width="3" height="30" fill="#8fa67e"/>
    <circle cx="582" cy="721" r="9" fill="url(#av2)"/><text x="582" y="725" fill="#cda84e" font-size="8" text-anchor="middle">A</text>
    <text x="600" y="725" fill="#f2e4bd" font-size="13">Sister Aveline</text>
    <text x="720" y="725" fill="#a9c089" font-size="10" font-style="italic">present · wary</text>
    <text x="840" y="725" fill="#9a8f78" font-size="10">Cleric, 34</text>
    <g fill="#8fa67e" font-size="9" font-family="monospace"><text x="980" y="725">●Coren</text><text x="1040" y="725" fill="#e09090">●Vicar</text></g>

    <rect x="560" y="740" width="680" height="30" rx="6" fill="#1c1813"/><rect x="560" y="740" width="3" height="30" fill="#9bc0e6"/>
    <circle cx="582" cy="755" r="9" fill="url(#av2)"/><text x="582" y="759" fill="#cda84e" font-size="8" text-anchor="middle">C</text>
    <text x="600" y="759" fill="#e7d6ad" font-size="13">Coren</text>
    <text x="720" y="759" fill="#9bc0e6" font-size="10" font-style="italic">active · guarded</text>
    <text x="840" y="759" fill="#9a8f78" font-size="10">Sellsword</text>

    <rect x="560" y="774" width="680" height="30" rx="6" fill="#221d15"/><rect x="560" y="774" width="3" height="30" fill="#cda84e" opacity="0.4"/>
    <circle cx="582" cy="789" r="9" fill="url(#av2)"/><text x="582" y="793" fill="#cda84e" font-size="8" text-anchor="middle">V</text>
    <text x="600" y="793" fill="#cdbfa0" font-size="13">The Vicar</text>
    <text x="720" y="793" fill="#9a8f78" font-size="10" font-style="italic">mentioned</text>
  </g>
  <text x="560" y="836" fill="#9fd08a" font-size="11" font-family="monospace">one-line-per-character for 50+ casts; tiny bond dots inline. A density toggle on the Cast tab.</text>

  <!-- recommendation footer -->
  <line x1="40" y1="900" x2="1240" y2="900" stroke="#cda84e" stroke-opacity="0.15"/>
  <text x="40" y="930" fill="#cda84e" font-size="14">My pick for a default: #3 UNFOLD + #6 STRIP toggle</text>
  <text x="40" y="952" fill="#9a8f78" font-size="12" font-style="italic">Keeps lists scannable, reveals depth on demand, scales to big casts — then theme-gate the flavor: Signet for Fantasy, Contact for Futuristic, Vitals for Modern, Tarot/Hand for the float gallery.</text>
  <text x="40" y="978" fill="#6f6655" font-size="11" font-style="italic">All reuse current data only. Concept art — not yet built; say the word and I'll implement the one you like.</text>
</svg>
