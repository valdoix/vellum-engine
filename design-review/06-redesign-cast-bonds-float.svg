<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="960" viewBox="0 0 1280 960" font-family="Georgia, serif">
  <defs>
    <linearGradient id="g6" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c1813"/><stop offset="1" stop-color="#14110c"/></linearGradient>
  </defs>
  <rect width="1280" height="960" fill="#26221b"/>
  <text x="40" y="46" fill="#cda84e" font-size="25" letter-spacing="2">REDESIGN — Cast cards, Bonds, &amp; the floating window</text>
  <text x="40" y="72" fill="#9a8f78" font-size="15" font-style="italic">The three highest-traffic surfaces. Left = current, right = redesign.</text>

  <!-- ===== CAST CARD ===== -->
  <text x="40" y="116" fill="#ff8a8a" font-family="monospace" font-size="13" letter-spacing="1">CAST CARD — today</text>
  <g>
    <rect x="40" y="130" width="540" height="62" rx="13" fill="url(#g6)" stroke="#cda84e" stroke-opacity="0.16"/>
    <circle cx="74" cy="161" r="17" fill="#cda84e" fill-opacity="0.18"/>
    <text x="74" y="166" fill="#cda84e" font-size="13" text-anchor="middle" font-weight="bold">SA</text>
    <text x="102" y="156" fill="#e7d6ad" font-size="16">Sister Aveline</text>
    <text x="102" y="174" fill="#9a8f78" font-family="monospace" font-size="10">Cleric · 34</text>
    <text x="102" y="189" fill="#9a8f78" font-size="13">Auburn hair, a burn scar along the jaw…</text>
    <g font-family="monospace" font-size="11" fill="#9a8f78">
      <text x="500" y="156">⤴</text><text x="525" y="156">✎</text><text x="548" y="156" fill="#c96a6a">✕</text>
    </g>
  </g>
  <text x="40" y="216" fill="#9a8f78" font-size="11.5">Status only as a faint avatar glow + sort order. Role/age in shouty mono. Controls hover-hidden.</text>

  <text x="40" y="256" fill="#9fd08a" font-family="monospace" font-size="13" letter-spacing="1">CAST CARD — redesign</text>
  <g>
    <rect x="40" y="270" width="540" height="76" rx="12" fill="url(#g6)" stroke="#8fa67e" stroke-opacity="0.3"/>
    <rect x="40" y="270" width="4" height="76" rx="2" fill="#8fa67e"/>
    <circle cx="78" cy="308" r="19" fill="#2a2417" stroke="#cda84e" stroke-width="2"/>
    <text x="78" y="313" fill="#cda84e" font-size="14" text-anchor="middle">SA</text>
    <circle cx="93" cy="294" r="5" fill="#8fa67e" stroke="#14110c" stroke-width="1.5"/>
    <text x="112" y="300" fill="#f2e4bd" font-size="18">Sister Aveline</text>
    <text x="112" y="320" fill="#a9c089" font-size="13" font-style="italic">present · in the crypt</text>
    <text x="112" y="338" fill="#b3a888" font-size="13">Cleric, 34 · auburn hair, a burn scar along the jaw</text>
    <g font-family="monospace" font-size="12" fill="#9a8f78">
      <text x="500" y="300">⤴</text><text x="524" y="300">✎</text><text x="548" y="300" fill="#c96a6a">✕</text>
    </g>
  </g>
  <text x="40" y="370" fill="#bcd9ad" font-size="11.5">A. Presence dot ON the avatar + colored spine = status visible without reading. Name in serif at 18px.</text>
  <text x="40" y="388" fill="#bcd9ad" font-size="11.5">B. Role/age fold into one sentence-case line. Edit controls always faintly visible (touch-friendly).</text>

  <!-- ===== BONDS CARD ===== -->
  <text x="40" y="430" fill="#ff8a8a" font-family="monospace" font-size="13" letter-spacing="1">BOND CARD — today</text>
  <g>
    <rect x="40" y="444" width="540" height="150" rx="9" fill="#16140f" stroke="#cda84e" stroke-opacity="0.16"/>
    <text x="58" y="468" fill="#e7d6ad" font-size="14">Aveline ↔ Coren</text>
    <text x="540" y="468" fill="#b48ed0" font-size="11" text-anchor="end">🔒</text>
    <text x="58" y="494" fill="#cdbfa0" font-size="12">Aveline → Coren</text>
    <text x="540" y="494" fill="#9a8f78" font-family="monospace" font-size="9" text-anchor="end">guarded</text>
    <!-- two faint thin bars -->
    <text x="58" y="514" fill="#9a8f78" font-family="monospace" font-size="9">Aff</text>
    <rect x="92" y="508" width="380" height="5" rx="3" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="92" y="508" width="280" height="5" rx="3" fill="#8fa67e"/>
    <rect x="280" y="506" width="1" height="7" fill="#fff" fill-opacity="0.2"/>
    <text x="58" y="530" fill="#9a8f78" font-family="monospace" font-size="9">Trust</text>
    <rect x="92" y="524" width="380" height="5" rx="3" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="92" y="524" width="120" height="5" rx="3" fill="#c96a6a"/>
    <text x="58" y="556" fill="#9a8f78" font-size="11" font-style="italic">▸ change history</text>
    <text x="58" y="580" fill="#cdbfa0" font-size="12">Coren → Aveline …(second full directional block repeats)</text>
  </g>
  <text x="40" y="616" fill="#9a8f78" font-size="11.5">Two directional sub-blocks stacked, each with its own pair of thin 5px bars. Center-zero implied, not shown.</text>

  <text x="40" y="656" fill="#9fd08a" font-family="monospace" font-size="13" letter-spacing="1">BOND CARD — redesign</text>
  <g>
    <rect x="40" y="670" width="540" height="190" rx="11" fill="#16140f" stroke="#cda84e" stroke-opacity="0.18"/>
    <text x="58" y="696" fill="#f2e4bd" font-size="17">Aveline ⇄ Coren</text>
    <text x="540" y="696" fill="#9a7ab0" font-size="11" text-anchor="end">🔒 romantic forbidden</text>
    <text x="58" y="716" fill="#9a8f78" font-size="12" font-style="italic">alliance · she romantic (one-sided)</text>

    <!-- dual diverging meters with a clear zero line -->
    <text x="58" y="748" fill="#8fa67e" font-family="monospace" font-size="9">AFFECTION</text>
    <line x1="310" y1="738" x2="310" y2="838" stroke="#fff" stroke-opacity="0.18" stroke-dasharray="2 3"/>
    <text x="306" y="734" fill="#6f6655" font-family="monospace" font-size="8">0</text>
    <!-- Aveline aff +56 -->
    <text x="58" y="766" fill="#cdbfa0" font-size="11">A→C</text>
    <rect x="310" y="758" width="160" height="8" rx="4" fill="#8fa67e"/>
    <text x="476" y="766" fill="#a9c089" font-family="monospace" font-size="10">+56</text>
    <!-- Coren aff +72 -->
    <text x="58" y="784" fill="#cdbfa0" font-size="11">C→A</text>
    <rect x="310" y="776" width="205" height="8" rx="4" fill="#8fa67e" fill-opacity="0.7"/>
    <text x="520" y="784" fill="#a9c089" font-family="monospace" font-size="10">+72</text>

    <text x="58" y="812" fill="#9bc0e6" font-family="monospace" font-size="9">TRUST</text>
    <!-- Aveline trust -20 (left of zero) -->
    <text x="58" y="830" fill="#cdbfa0" font-size="11">A→C</text>
    <rect x="252" y="822" width="58" height="8" rx="4" fill="#c96a6a"/>
    <text x="214" y="830" fill="#e09090" font-family="monospace" font-size="10">−20</text>
    <!-- Coren trust +40 -->
    <text x="58" y="848" fill="#cdbfa0" font-size="11">C→A</text>
    <rect x="310" y="840" width="114" height="8" rx="4" fill="#9bc0e6"/>
    <text x="430" y="848" fill="#9bc0e6" font-family="monospace" font-size="10">+40</text>
  </g>
  <text x="40" y="884" fill="#bcd9ad" font-size="11.5">C. ONE card, both directions interleaved per axis, diverging from a visible zero. Asymmetry (she mistrusts,</text>
  <text x="40" y="902" fill="#bcd9ad" font-size="11.5">he trusts) is instantly readable. Thicker 8px bars. “infatuation vs respect” becomes a glance, not arithmetic.</text>

  <!-- ===== FLOATING WINDOW ===== -->
  <text x="640" y="116" fill="#cda84e" font-family="monospace" font-size="13" letter-spacing="1">FLOATING WINDOW — chrome notes</text>

  <!-- the window -->
  <g>
    <rect x="700" y="150" width="300" height="380" rx="16" fill="url(#g6)" stroke="#cda84e" stroke-opacity="0.5"/>
    <rect x="700" y="150" width="300" height="70" rx="16" fill="#cda84e" fill-opacity="0.06"/>
    <text x="722" y="186" fill="#cda84e" font-size="14">❖</text>
    <text x="744" y="188" fill="#e7d6ad" font-size="16" letter-spacing="3">VELLUM</text>
    <text x="940" y="188" fill="#9a8f78" font-family="monospace" font-size="11">⟳</text>
    <text x="968" y="188" fill="#9a8f78" font-size="13">✕</text>
    <line x1="700" y1="204" x2="1000" y2="204" stroke="#cda84e" stroke-opacity="0.2"/>
    <text x="722" y="240" fill="#f2e4bd" font-size="19" font-style="italic">The drowned chapel</text>
    <text x="722" y="262" fill="#8a8071" font-family="monospace" font-size="10">T147 · dusk · rain</text>
    <rect x="722" y="282" width="256" height="60" rx="9" fill="#1c1813"/>
    <rect x="722" y="282" width="3" height="60" fill="#8fa67e"/>
    <text x="738" y="304" fill="#f2e4bd" font-size="15">Aveline</text>
    <text x="738" y="324" fill="#b3a888" font-size="12" font-style="italic">pressing a sleeve to the wound</text>
    <rect x="722" y="352" width="256" height="46" rx="9" fill="#1c1813"/>
    <rect x="722" y="352" width="3" height="46" fill="#8fa67e"/>
    <text x="738" y="374" fill="#f2e4bd" font-size="15">Coren</text>
    <text x="738" y="392" fill="#b3a888" font-size="12" font-style="italic">blade half-drawn</text>
    <!-- resize grip -->
    <path d="M982 512 l8 0 l0 -8 M988 512 l2 0 l0 -2" stroke="#cda84e" stroke-opacity="0.5" stroke-width="1.5" fill="none"/>
    <!-- only ONE action + close in the bar -->
  </g>

  <g font-family="monospace" font-size="12.5" fill="#9fd08a">
    <text x="640" y="566">D. The float bar today has only [⟳ refresh] + [✕]. Good restraint —</text>
    <text x="660" y="586" fill="#bcd9ad">keep it. But add a tiny tab affordance so the float can reach Cast/Bonds,</text>
    <text x="660" y="606" fill="#bcd9ad">not just “Now”. Right now the float is a dead-end second-class view.</text>

    <text x="640" y="640" fill="#9fd08a">E. The gilt double-rule frame (::before inset border + ::after bloom) is</text>
    <text x="660" y="660" fill="#bcd9ad">lovely but fires on EVERY skin. On Noir/Onyx it reads as visual debris.</text>
    <text x="660" y="680" fill="#bcd9ad">Gate ornament to the ‘illuminated’ chrome only (the code already supports</text>
    <text x="660" y="700" fill="#bcd9ad">data-vle-chrome — just lean on it harder for modern/futuristic).</text>

    <text x="640" y="734" fill="#9fd08a">F. Min window is 280×220px. At that size the title’s 3px letter-spacing +</text>
    <text x="660" y="754" fill="#bcd9ad">20px caps wraps/clips. Scale the title with window width, not just --vscale.</text>

    <text x="640" y="788" fill="#9fd08a">G. Launcher tab + input-bar button both open the float. Pick one primary;</text>
    <text x="660" y="808" fill="#bcd9ad">keep the edge-launcher as the guaranteed fallback (it already self-hides</text>
    <text x="660" y="828" fill="#bcd9ad">when open — that part’s well done).</text>

    <text x="640" y="868" fill="#cda84e">All of this is presentation-layer only — no engine, schema, or</text>
    <text x="660" y="888" fill="#cda84e">event-log changes. Verify on real builds before shipping.</text>
  </g>
</svg>
